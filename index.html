<body class="bg-brutal-neutral text-brutal-primary font-inter antialiased text-sm">
  <div id="root"></div>
  
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const radLat1 = lat1 * Math.PI/180;
      const radLat2 = lat2 * Math.PI/180;
      const deltaLat = (lat2-lat1) * Math.PI/180;
      const deltaLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) + Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function getLocalYYYYMMDD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeForInput(timeStr) {
      if (!timeStr || timeStr === '-') return '';
      return timeStr.replace(/\./g, ':').slice(0, 5);
    }

    const CalendarComponent = ({ userRole, settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb }) => {
      const [viewDate, setViewDate] = useState(new Date());

      const days = useMemo(() => {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        let dateArr = [];
        for (let i = 0; i < firstDay; i++) dateArr.push(null);
        for (let i = 1; i <= lastDate; i++) dateArr.push(new Date(year, month, i));
        return dateArr;
      }, [viewDate]);

      const changeMonth = (offset) => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + offset, 1));

      const handleDateClick = async (date) => {
        if (userRole !== 'admin') return;
        if (!date) return;
        const dateStr = getLocalYYYYMMDD(date);
        const existing = holidaysDb.find(h => h.date === dateStr);

        if (existing) {
          Swal.fire({
            title: 'Hapus Libur?',
            text: `Ingin menghapus libur: "${existing.description}"?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Ya, Hapus',
            cancelButtonText: 'Batal',
            customClass: { 
              popup: 'swal2-minimalist-popup w-[90%] max-w-md',
              confirmButton: 'w-full bg-brutal-error text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mb-2 mt-4',
              cancelButton: 'w-full bg-white text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg',
              actions: 'flex flex-col w-full p-0'
            },
            buttonsStyling: false
          }).then(async res => {
            if (res.isConfirmed) {
              await window.fs.deleteDoc(window.fs.doc(window.db, "holidays", existing.id.toString()));
              setHolidaysDb(prev => prev.filter(h => h.id !== existing.id));
            }
          });
        } else {
          Swal.fire({
            title: 'Tambah Hari Libur',
            text: `${date.toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})}`,
            input: 'text',
            inputPlaceholder: 'Keterangan libur (Cth: Idul Fitri)',
            showCancelButton: true,
            confirmButtonText: 'Simpan',
            cancelButtonText: 'Batal',
            customClass: { 
              popup: 'swal2-minimalist-popup w-[90%] max-w-md',
              confirmButton: 'w-full bg-brutal-secondary text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mb-2 mt-4',
              cancelButton: 'w-full bg-white text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg',
              actions: 'flex flex-col w-full p-0'
            },
            buttonsStyling: false,
            inputValidator: (value) => { if (!value) return 'Keterangan wajib diisi!'; }
          }).then(async res => {
            if (res.isConfirmed) {
              const added = { id: Date.now(), date: dateStr, description: res.value };
              await window.fs.setDoc(window.fs.doc(window.db, "holidays", added.id.toString()), added);
              setHolidaysDb(prev => [...prev, added]);
            }
          });
        }
      };

      const handleSaveRoutineSettings = async () => {
        setIsSavingSettings(true);
        try {
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), settingsDb);
          setIsSavingSettings(false);
          Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Aturan libur diperbarui.', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-md' } });
        } catch (error) {
          setIsSavingSettings(false);
          Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal menyimpan aturan', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-md' }});
        }
      };

      const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
      const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';

      return (
        <div className="animate-fadeIn space-y-6">
          <div className="bg-brutal-surface p-4 md:p-8 rounded-sm shadow-brutal border-4 border-black">
            <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 space-y-4 md:space-y-0">
              <div className="flex items-center justify-between w-full md:w-auto bg-brutal-neutral p-1.5 border-2 border-black rounded-none shadow-brutal-sm">
                <button onClick={() => changeMonth(-1)} className="p-3 md:p-2 bg-white border-2 border-black shadow-brutal-sm hover:-translate-y-0.5 hover:shadow-brutal active:translate-y-0.5 active:shadow-brutal-active rounded-none transition-all shrink-0">
                  <i className="fas fa-chevron-left text-black text-sm"></i>
                </button>
                
                <h3 className="text-base sm:text-lg font-space font-bold text-black text-center tracking-tight flex-1 md:min-w-[160px] uppercase">
                  {viewDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })}
                </h3>
                
                <button onClick={() => changeMonth(1)} className="p-3 md:p-2 bg-white border-2 border-black shadow-brutal-sm hover:-translate-y-0.5 hover:shadow-brutal active:translate-y-0.5 active:shadow-brutal-active rounded-none transition-all shrink-0">
                  <i className="fas fa-chevron-right text-black text-sm"></i>
                </button>
              </div>

              {userRole === 'admin' ? (
                <div className="flex items-center space-x-3 bg-white p-2 rounded-none shadow-brutal-sm border-2 border-black flex-wrap sm:flex-nowrap gap-y-2">
                  <label className="flex items-center space-x-2 cursor-pointer group px-2">
                    <input type="checkbox" className="w-5 h-5 rounded-none border-2 border-black text-black focus:ring-0" 
                      checked={isLiburMinggu} onChange={e => setSettingsDb({...settingsDb, liburMinggu: e.target.checked ? 'true' : 'false'})} />
                    <span className="text-sm font-space font-bold text-black group-hover:bg-brutal-secondary transition-colors px-1">Minggu Libur</span>
                  </label>
                  <div className="h-6 w-0.5 bg-black hidden sm:block"></div>
                  <label className="flex items-center space-x-2 cursor-pointer group px-2">
                    <input type="checkbox" className="w-5 h-5 rounded-none border-2 border-black text-black focus:ring-0" 
                      checked={isLiburSabtu} onChange={e => setSettingsDb({...settingsDb, liburSabtu: e.target.checked ? 'true' : 'false'})} />
                    <span className="text-sm font-space font-bold text-black group-hover:bg-brutal-secondary transition-colors px-1">Sabtu Libur</span>
                  </label>
                  <button onClick={handleSaveRoutineSettings} disabled={isSavingSettings} 
                    className="sm:ml-2 w-full sm:w-auto bg-brutal-primary text-white text-xs px-5 py-2.5 rounded-none hover:-translate-y-0.5 active:translate-y-0.5 shadow-brutal-sm active:shadow-brutal-active transition-all font-space font-bold disabled:opacity-50 border-2 border-black">
                    {isSavingSettings ? <i className="fas fa-spinner fa-spin"></i> : 'Update'}
                  </button>
                </div>
              ) : (
                <div className="flex items-center bg-brutal-cyan text-black px-4 py-2 rounded-none border-2 border-black shadow-brutal-sm">
                  <i className="fas fa-info-circle mr-2"></i>
                  <span className="text-sm font-space font-bold">Mode Hanya Lihat</span>
                </div>
              )}
            </div>

            <div className="grid grid-cols-7 gap-1 md:gap-2">
              {['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'].map((day, i) => (
                <div key={day} className={`pb-2 text-center text-xs font-space font-bold uppercase tracking-wider ${i === 6 ? 'text-brutal-error' : 'text-black'}`}>
                  {day}
                </div>
              ))}
              {days.map((date, idx) => {
                if (!date) return <div key={`p-${idx}`} className="h-20 sm:h-32 bg-brutal-neutral/50 border-2 border-transparent rounded-none opacity-40"></div>;
                
                const dateStr = getLocalYYYYMMDD(date);
                const dayOfWeek = date.getDay();
                const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
                const specialHoliday = holidaysDb.find(h => h.date === dateStr);
                const isToday = dateStr === getLocalYYYYMMDD(new Date());

                const dailyRecords = attendanceDb.filter(a => a.date === dateStr && ['Hadir', 'Terlambat'].includes(a.status));
                const attendedNames = dailyRecords.map(r => {
                  const u = usersDb.find(user => user.id === r.userId);
                  return u ? u.username : null; 
                }).filter(Boolean);

                return (
                  <div key={dateStr} onClick={() => handleDateClick(date)}
                    className={`relative h-20 sm:h-32 p-1.5 sm:p-2 rounded-none border-2 transition-all flex flex-col overflow-hidden
                      ${isToday ? 'border-black bg-brutal-secondary shadow-brutal z-10' : 'border-black bg-brutal-surface hover:shadow-brutal-sm hover:-translate-y-0.5'}
                      ${isRoutineHoliday || specialHoliday ? 'bg-brutal-tertiary' : ''}
                      ${userRole === 'admin' ? 'cursor-pointer group' : ''}
                    `}>
                    <div className="flex justify-between items-start mb-1 shrink-0">
                      <span className={`text-xs sm:text-sm font-space font-bold w-5 h-5 sm:w-6 sm:h-6 flex items-center justify-center rounded-none border border-black transition-colors z-10
                        ${isToday ? 'bg-black text-white shadow-brutal-sm' : (isRoutineHoliday || specialHoliday ? 'bg-brutal-error text-white' : 'bg-white text-black shadow-brutal-sm')}
                      `}>{date.getDate()}</span>
                      {specialHoliday && <div className="bg-white border border-black w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-none animate-pulse shadow-brutal-sm z-10 mt-1 mr-1 shrink-0"></div>}
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-1 z-10 relative text-left min-h-[20px] mt-1">
                      {attendedNames.map((name, i) => (
                        <div key={i} className="text-[9px] sm:text-[10px] bg-white border border-black text-black px-1.5 py-0.5 rounded-none truncate font-bold leading-tight shadow-[1px_1px_0_0_#000]">
                          {name}
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-1 z-10 relative shrink-0 pt-1 border-t-2 border-black/20">
                      {isRoutineHoliday && !specialHoliday && <span className="text-[9px] sm:text-[10px] text-black font-space font-bold uppercase tracking-wider block">Libur</span>}
                      {specialHoliday && <div className="bg-black text-white px-1.5 py-1 rounded-none shadow-brutal-sm"><p className="text-[8px] sm:text-[9px] leading-tight font-bold line-clamp-1">{specialHoliday.description}</p></div>}
                    </div>

                    {userRole === 'admin' && (
                      <div className="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors flex items-center justify-center pointer-events-none">
                        <i className="fas fa-plus-square text-black opacity-0 group-hover:opacity-30 text-2xl transform scale-50 group-hover:scale-100 transition-all"></i>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="mt-6 flex flex-wrap gap-4 text-xs font-space font-bold uppercase tracking-wider text-black border-t-4 border-black pt-4 justify-center">
              <div className="flex items-center space-x-1.5"><div className="w-4 h-4 bg-white border-2 border-black"></div><span>Libur Nasional</span></div>
              <div className="flex items-center space-x-1.5"><div className="w-4 h-4 bg-brutal-tertiary border-2 border-black"></div><span>Libur</span></div>
              <div className="flex items-center space-x-1.5"><div className="w-4 h-4 bg-brutal-secondary border-2 border-black shadow-brutal-sm"></div><span>Hari Ini</span></div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isDataReady, setIsDataReady] = useState(false);
      const [isLocating, setIsLocating] = useState(false); 
      const [isSavingSettings, setIsSavingSettings] = useState(false); 
      
      const [user, setUser] = useState(() => {
        try {
          const savedUser = localStorage.getItem('presensi_user');
          return savedUser ? JSON.parse(savedUser) : null; 
        } catch(e) { 
          return null; 
        }
      }); 
      
      const [activeMenu, setActiveMenu] = useState(() => {
        try {
          return localStorage.getItem('presensi_menu') || 'dashboard';
        } catch(e) {
          return 'dashboard';
        }
      });
      
      const [filterMonth, setFilterMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });

      const [usersDb, setUsersDb] = useState([]);
      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]); 
      const [verificationsDb, setVerificationsDb] = useState([]); 
      
      const [settingsDb, setSettingsDb] = useState({
        namaKegiatan: '',
        namaInstansi: 'Memuat...', lokasi: '', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', penanggungJawab: '[]',
        useLocation: 'true', useTime: 'true', alamat: '', desaKecamatan: '', kotaKabupaten: '', negara: 'Indonesia', kodePos: '', appScriptUrl: ''
      });
      const [currentTime, setCurrentTime] = useState(new Date());
      const [newUser, setNewUser] = useState({ name: '', username: '', nim: '' });

      useEffect(() => {
        const initData = async () => {
          try {
            const [usersSnap, attSnap, holSnap, verSnap, setSnap] = await Promise.all([
              window.fs.getDocs(window.fs.collection(window.db, "users")),
              window.fs.getDocs(window.fs.collection(window.db, "attendance")),
              window.fs.getDocs(window.fs.collection(window.db, "holidays")),
              window.fs.getDocs(window.fs.collection(window.db, "verifications")),
              window.fs.getDocs(window.fs.collection(window.db, "settings"))
            ]);

            let u = usersSnap.docs.map(d => d.data());
            let a = attSnap.docs.map(d => d.data());
            let h = holSnap.docs.map(d => d.data());
            let v = verSnap.docs.map(d => d.data());
            
            let s = {};
            setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });

            if (u.length === 0) {
              const defaultAdmin = { id: 1, name: 'Administrator', username: 'admin', role: 'admin', nim: 'HRD' };
              await window.fs.setDoc(window.fs.doc(window.db, "users", "1"), defaultAdmin);
              u.push(defaultAdmin);
            }

            if(Object.keys(s).length === 0) {
              s = { namaInstansi: 'Sistem Presensi Default', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', useLocation: 'false', useTime: 'true' };
              await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), s);
            }

            let pM = s.jamMasuk, pP = s.jamPulang;
            const fix = (t) => { if(!t) return null; const m = String(t).replace(/\./g, ':').match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2, '0')}:${m[2]}` : t; };
            
            const finalSettings = { 
              ...settingsDb, 
              ...s, 
              jamMasuk: fix(pM) || '08:00', 
              jamPulang: fix(pP) || '17:00',
              useLocation: s.hasOwnProperty('useLocation') ? String(s.useLocation).toLowerCase() : 'true',
              useTime: s.hasOwnProperty('useTime') ? String(s.useTime).toLowerCase() : 'true',
            };

            const now = new Date();
            const currentYYYYMMDD = getLocalYYYYMMDD(now);
            const currentHm = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
            
            let processedAtt = a.map(record => {
                if (record.status === 'Menunggu') {
                    let shouldBeAlpa = false;
                    if (record.date < currentYYYYMMDD) {
                        shouldBeAlpa = true;
                    } else if (record.date === currentYYYYMMDD) {
                        const pH = parseInt((finalSettings.jamPulang || '17:00').split(':')[0]);
                        const pMin = parseInt((finalSettings.jamPulang || '17:00').split(':')[1]);
                        const cH = parseInt(currentHm.split(':')[0]);
                        const cMin = parseInt(currentHm.split(':')[1]);
                        
                        if (cH > pH || (cH === pH && cMin >= pMin)) {
                            shouldBeAlpa = true;
                        }
                    }
                    if (shouldBeAlpa) {
                        window.fs.updateDoc(window.fs.doc(window.db, "attendance", record.id.toString()), { status: 'Alpa' }).catch(console.error);
                        return { ...record, status: 'Alpa' };
                    }
                }
                return record;
            });

            setSettingsDb(finalSettings);
            setUsersDb(u);
            setHolidaysDb(h);
            setVerificationsDb(v);
            setAttendanceDb(processedAtt);
            
            let savedUserStr = null;
            try { savedUserStr = localStorage.getItem('presensi_user'); } catch(e) {}

            if (savedUserStr) {
               try {
                  const parsed = JSON.parse(savedUserStr);
                  const validUser = u.find(user => user.username === parsed.username);
                  if(validUser){
                      setUser(validUser);
                  } else {
                      try { localStorage.removeItem('presensi_user'); } catch(e) {}
                  }
               } catch(e) {}
            }
            
            setIsDataReady(true);

            let existingUserRec = attendanceDb.find(a => a.userId === user.id && a.date === todayStr);

         Swal.fire({html: '<div class="flex flex-col items-center py-2"><div class="w-12 h-12 border-4 border-black border-t-brutal-cyan rounded-none animate-spin mb-4"></div><p class="text-black font-space font-bold text-lg uppercase">Menyiapkan Tautan Unik...</p></div>', showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-xs' }});
         
         try {
            const uniqueChars = Math.random().toString(36).substring(2, 8).toUpperCase();
            const vid = filterMonth.replace('-', '') + '-' + uniqueChars;
            
            let currentUrl = window.location.href.split('?')[0];
            let cleanBase = currentUrl.endsWith('/') ? currentUrl + 'verification.html' : currentUrl.replace('index.html', 'verification.html');
            if(settingsDb.appScriptUrl) cleanBase = settingsDb.appScriptUrl.trim().replace(/\/$/, "");
            
            const separator = cleanBase.includes("?") ? "&" : "?";
            const finalUrl = `${cleanBase}${separator}vid=${vid}`;
            
            const newVerif = { month: filterMonth, vid: vid, url: finalUrl };
            await window.fs.setDoc(window.fs.doc(window.db, "verifications", filterMonth), newVerif);
            
            setVerificationsDb(prev => { const cleaned = prev.filter(v => v.month !== filterMonth); return [...cleaned, newVerif]; });
            Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Tautan Verifikasi untuk bulan ini berhasil dibuat!', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
         } catch (e) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal membuat tautan verifikasi', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-brutal-secondary text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mt-4' }, buttonsStyling: false });
         }
      };

      const handleDownloadPDF = async () => {
        const defaultDate = currentTime.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        const defaultCity = settingsDb.kotaKabupaten || '';

        const proceedToPopup = (qrUrlParam) => {
          Swal.fire({
            title: 'Pengaturan Cetak',
            html: `
              <div class="text-left mt-4 space-y-4 font-inter">
                <div class="bg-brutal-surface p-3 rounded-none border-2 border-black shadow-[2px_2px_0_0_#000]">
                  <label class="block text-xs font-space font-bold uppercase tracking-wider text-black mb-2">Kota Tanda Tangan</label>
                  <input type="text" id="pdfCity" class="w-full bg-white border-2 border-black px-3 py-2 outline-none font-bold text-black text-sm focus:shadow-[4px_4px_0_0_#000] transition-shadow" value="${defaultCity}" placeholder="Cth: Jember">
                </div>
                <div class="bg-brutal-surface p-3 rounded-none border-2 border-black shadow-[2px_2px_0_0_#000]">
                  <label class="block text-xs font-space font-bold uppercase tracking-wider text-black mb-2">Tanggal Cetak</label>
                  <input type="text" id="pdfDate" class="w-full bg-white border-2 border-black px-3 py-2 outline-none font-bold text-black text-sm focus:shadow-[4px_4px_0_0_#000] transition-shadow" value="${defaultDate}">
                </div>
              </div>
            `,
            showCancelButton: true, confirmButtonText: 'Unduh Sekarang', cancelButtonText: 'Batal', buttonsStyling: false,
            customClass: { 
              popup: 'swal2-minimalist-popup w-[90%] max-w-md', 
              confirmButton: 'w-full bg-brutal-secondary text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mb-2 mt-6', 
              cancelButton: 'w-full bg-white text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg', 
              actions: 'flex flex-col w-full p-0' 
            },
            preConfirm: () => { return { city: document.getElementById('pdfCity').value, date: document.getElementById('pdfDate').value } }
          }).then((result) => {
            if (result.isConfirmed) {
              Swal.fire({ html: '<div class="flex flex-col items-center py-2"><div class="w-12 h-12 border-4 border-black border-t-brutal-error rounded-none animate-spin mb-4"></div><p class="text-black font-space font-bold text-lg uppercase">Menyiapkan PDF...</p></div>', showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-xs' } });

              setTimeout(() => {
                try {
                  const { city, date } = result.value;
                  const { jsPDF } = window.jspdf;
                  const doc = new jsPDF({ orientation: 'landscape', format: [210, 330] });

                  const [yearStr, monthStr] = filterMonth.split('-');
                  const year = parseInt(yearStr);
                  const monthIndex = parseInt(monthStr) - 1; 
                  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
                  const datesWithActivity = new Set(attendanceDb.map(a => a.date));

                  const head = [['No', 'Nama Lengkap']];
                  for (let i = 1; i <= daysInMonth; i++) head[0].push(i.toString()); 
                  head[0].push('H', 'I', 'S', 'A');

                  const colStyles = { 0: { halign: 'center', cellWidth: 8 }, 1: { halign: 'left' } };
                  for (let i = 1; i <= daysInMonth; i++) colStyles[i + 1] = { halign: 'center', cellWidth: 7.2 }; 
                  colStyles[daysInMonth + 2] = { halign: 'center', cellWidth: 7, fontStyle: 'bold' }; 
                  colStyles[daysInMonth + 3] = { halign: 'center', cellWidth: 7, fontStyle: 'bold' };
                  colStyles[daysInMonth + 4] = { halign: 'center', cellWidth: 7, fontStyle: 'bold' }; 
                  colStyles[daysInMonth + 5] = { halign: 'center', cellWidth: 7, fontStyle: 'bold' };  

                  const body = [];
                  const clients = usersDb.filter(u => u.role === 'client');

                  clients.forEach((client, index) => {
                    const clientNameNim = client.name + '\n' + (client.nim || '-');
                    const row = [index + 1, clientNameNim];
                    let totalHadir = 0, totalIzin = 0, totalSakit = 0, totalAlpa = 0;

                    for (let d = 1; d <= daysInMonth; d++) {
                      const dayDate = new Date(year, monthIndex, d);
                      const dateStr = getLocalYYYYMMDD(dayDate);
                      const dayOfWeek = dayDate.getDay();
                      const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
                      const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';
                      const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
                      const isSpecialHoliday = holidaysDb.find(h => h.date === dateStr);

                      const record = attendanceDb.find(a => a.userId === client.id && a.date === dateStr);
                      const hasActivityOnDate = datesWithActivity.has(dateStr); 

                      if (record) {
                        if (record.status === 'Hadir' || record.status === 'Terlambat') { row.push(record.status === 'Hadir' ? 'H' : 'T'); totalHadir++; }
                        else if (record.status === 'Izin') { row.push('I'); totalIzin++; }
                        else if (record.status === 'Sakit') { row.push('S'); totalSakit++; }
                        else if (record.status === 'Alpa') { row.push('A'); totalAlpa++; }
                        else { row.push(''); } 
                      } else {
                        if (isRoutineHoliday || isSpecialHoliday) row.push('L');
                        else {
                           if (dayDate <= new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate())) {
                              if (hasActivityOnDate) { row.push('A'); totalAlpa++; } else row.push('');
                           } else row.push('');
                        }
                      }
                    }
                    row.push(totalHadir.toString(), totalIzin.toString(), totalSakit.toString(), totalAlpa.toString());
                    body.push(row);
                  });

                  const pageWidth = doc.internal.pageSize.getWidth();
                  const monthName = new Date(year, monthIndex).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                  
                  let currentY = 14;

                  if (settingsDb.namaKegiatan && settingsDb.namaKegiatan.trim() !== '') {
                    doc.setFontSize(14).setFont("helvetica", "bold").setTextColor(0, 0, 0); 
                    const splitKegiatan = doc.splitTextToSize(settingsDb.namaKegiatan.toUpperCase(), 200);
                    doc.text(splitKegiatan, 8, currentY);
                    currentY += (splitKegiatan.length * 5); 
                  }

                  doc.setFontSize(14).setFont("helvetica", "bold").setTextColor(0, 0, 0); 
                  const splitInstansi = doc.splitTextToSize((settingsDb.namaInstansi || '').toUpperCase(), 200);
                  doc.text(splitInstansi, 8, currentY);
                  currentY += (splitInstansi.length * 5) + 2; 

                  const addressParts = [settingsDb.alamat, settingsDb.desaKecamatan, settingsDb.kotaKabupaten, settingsDb.negara, settingsDb.kodePos].filter(Boolean).join(', ');
                  if (addressParts) {
                    doc.setFontSize(8).setFont("helvetica", "normal").setTextColor(0, 0, 0);
                    const splitAddress = doc.splitTextToSize(addressParts, 130); 
                    doc.text(splitAddress, 8, currentY);
                    currentY += (splitAddress.length * 4); 
                  }
                  const rightTextX = pageWidth - 28;
                  doc.setFontSize(12).setFont("helvetica", "bold").setTextColor(0, 0, 0).text("LAPORAN REKAPITULASI PRESENSI", rightTextX, 14, { align: 'right' });
                  doc.setFontSize(9).setFont("helvetica", "normal").setTextColor(0, 0, 0).text(`Periode: ${monthName}`, rightTextX, 19, { align: 'right' });
                  
                  const currentVerifMatch = verificationsDb.find(v => v.month === filterMonth);
                  const docId = currentVerifMatch ? currentVerifMatch.vid : `${year}${monthStr}-${Date.now().toString(16).substring(4).toUpperCase()}`;
                  doc.setFontSize(8).setFont("helvetica", "bold").setTextColor(0, 0, 0).text(`ID DOKUMEN: ${docId}`, rightTextX, 23, { align: 'right' });

                  const lineY = Math.max(29, currentY + 3); 
                  doc.setLineWidth(1).setDrawColor(0, 0, 0).line(8, lineY, pageWidth - 8, lineY);

                  doc.autoTable({
                    startY: lineY + 4, margin: { left: 8, right: 8 }, head: head, body: body, theme: 'grid',
                    styles: { fontSize: 7.5, halign: 'center', valign: 'middle', cellPadding: 1.5, lineColor: [0, 0, 0], lineWidth: 0.5 },
                    headStyles: { fillColor: [255, 210, 63], textColor: [0, 0, 0], fontStyle: 'bold', lineColor: [0, 0, 0], lineWidth: 0.5 },
                    columnStyles: colStyles,
                    didParseCell: function(data) {
                       const isColumnDate = data.column.index > 1 && data.column.index <= daysInMonth + 1;
                       let isHolidayCol = false;
                       if (isColumnDate) {
                          const dayDate = new Date(year, monthIndex, data.column.index - 1);
                          const dateStr = getLocalYYYYMMDD(dayDate);
                          const dayOfWeek = dayDate.getDay();
                          const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
                          const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';
                          isHolidayCol = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu) || holidaysDb.find(h => h.date === dateStr);
                       }
                       if (data.section === 'head') {
                         data.cell.styles.fillColor = [255, 210, 63]; 
                         data.cell.styles.textColor = [0, 0, 0];
                       }
                       if (data.section === 'body') {
                         if (data.column.index === 0 || data.column.index === 1) { 
                            data.cell.styles.textColor = [0, 0, 0]; 
                            data.cell.styles.fontStyle = 'bold'; 
                            data.cell.styles.fontSize = 8.5; 
                         }
                         if (isColumnDate) {
                           const val = data.cell.raw;
                           if (val === 'H') { data.cell.styles.textColor = [0, 0, 0]; data.cell.styles.fillColor = [127, 221, 224]; data.cell.styles.fontStyle = 'bold'; }
                           else if (val === 'T') { data.cell.styles.textColor = [0, 0, 0]; data.cell.styles.fillColor = [255, 210, 63]; data.cell.styles.fontStyle = 'bold'; }
                           else if (val === 'I') { data.cell.styles.textColor = [0, 0, 0]; data.cell.styles.fillColor = [255, 107, 107]; data.cell.styles.fontStyle = 'bold'; }
                           else if (val === 'S') { data.cell.styles.textColor = [0, 0, 0]; data.cell.styles.fillColor = [255, 107, 107]; data.cell.styles.fontStyle = 'bold'; }
                           else if (val === 'A') { data.cell.styles.textColor = [0, 0, 0]; data.cell.styles.fillColor = [255, 77, 77]; data.cell.styles.fontStyle = 'bold'; }
                           else if (val === 'L' || isHolidayCol) { data.cell.styles.textColor = [255, 255, 255]; data.cell.styles.fillColor = [0, 0, 0]; data.cell.styles.fontStyle = 'bold'; }
                         } else if (data.column.index >= daysInMonth + 2) {
                            if (data.column.index === daysInMonth + 2) data.cell.styles.textColor = [0, 0, 0]; 
                            if (data.column.index === daysInMonth + 3) data.cell.styles.textColor = [0, 0, 0]; 
                            if (data.column.index === daysInMonth + 4) data.cell.styles.textColor = [0, 0, 0]; 
                            if (data.column.index === daysInMonth + 5) data.cell.styles.textColor = [0, 0, 0]; 
                         }
                       }
                    }
                  });

                  const finalY = doc.lastAutoTable.finalY || 28;
                  doc.setFontSize(8).setTextColor(0, 0, 0).setFont("helvetica", "bold");
                  doc.text("Keterangan: H (Hadir), T (Terlambat), I (Izin), S (Sakit), A (Alpa/Tidak Hadir), L (Libur)", 14, finalY + 6);

                  doc.setFontSize(10).setTextColor(0, 0, 0);
                  let signatureY = finalY + 35; 
                  
                  let pjs = [];
                  try { pjs = JSON.parse(settingsDb.penanggungJawab || "[]"); } catch(e) {}
                  if (pjs.length === 0) pjs = [{jabatan: 'Penanggung Jawab', nama: '...................................', nip: 'NIP/NIM.'}];

                  const nPjs = pjs.length;
                  const totalRows = Math.ceil(nPjs / 2);
                  const colLeftX = pageWidth * 0.25;
                  const colRightX = pageWidth * 0.75;
                  const colCenterX = pageWidth * 0.5;

                  const mengetahuiX = (nPjs === 1) ? colCenterX : colRightX;
                  const locationDateText = city ? `${city}, ${date}` : date;
                  doc.text(locationDateText, mengetahuiX, signatureY - 14, { align: "center" });
                  doc.text("Mengetahui,", mengetahuiX, signatureY - 8, { align: "center" });

                  pjs.forEach((pj, idx) => {
                     let row, colX;
                     if (nPjs % 2 !== 0) { 
                        if (idx === 0) {
                           row = totalRows - 1; 
                           colX = colCenterX;   
                        } else {
                           let pairIndex = Math.ceil(idx / 2);
                           row = totalRows - 1 - pairIndex;                
                           colX = (idx % 2 === 1) ? colRightX : colLeftX; 
                        }
                     } else { 
                        let pairIndex = Math.floor(idx / 2);
                        row = totalRows - 1 - pairIndex;               
                        colX = (idx % 2 === 0) ? colRightX : colLeftX; 
                     }

                     const currentY = signatureY + (row * 35);
                     doc.setFont("helvetica", "normal").text(pj.jabatan || "...................................", colX, currentY, { align: "center" });
                     doc.setFont("helvetica", "bold").text(pj.nama || "...................................", colX, currentY + 20, { align: "center" });
                     doc.setFont("helvetica", "normal").text(pj.nip || "NIP/NIM. ", colX, currentY + 25, { align: "center" });
                  });

                  const savePDF = () => {
                     doc.save(`Rekap_Presensi_${monthName.replace(' ', '_')}.pdf`);
                     Swal.close();
                  };

                  if (qrUrlParam) {
                     const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=1&data=${encodeURIComponent(qrUrlParam)}`;
                     const img = new Image();
                     img.crossOrigin = "Anonymous";
                     img.onload = () => {
                         const canvas = document.createElement('canvas');
                         canvas.width = img.width; canvas.height = img.height;
                         const ctx = canvas.getContext('2d');
                         ctx.drawImage(img, 0, 0);
                         const dataURL = canvas.toDataURL('image/png');
                         doc.addImage(dataURL, 'PNG', pageWidth - 26, 8, 18, 18);
                         savePDF();
                     };
                     img.onerror = () => savePDF();
                     img.src = qrUrl;
                  } else {
                     savePDF(); 
                  }
                } catch (error) {
                  console.error(error);
                  Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal memproses file PDF.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-brutal-secondary text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mt-4' }, buttonsStyling: false });
                }
              }, 100);
            }
          });
        };

        const currentVerif = verificationsDb.find(v => v.month === filterMonth);
        if (!currentVerif && filteredAttendanceData.length > 0) {
           Swal.fire({html: '<div class="flex flex-col items-center py-2"><div class="w-12 h-12 border-4 border-black border-t-brutal-cyan rounded-none animate-spin mb-4"></div><p class="text-black font-space font-bold text-lg uppercase">Menyiapkan Tautan Unik...</p></div>', showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-xs' }});
           try {
              const uniqueChars = Math.random().toString(36).substring(2, 8).toUpperCase();
              const vid = filterMonth.replace('-', '') + '-' + uniqueChars;
              let currentUrl = window.location.href.split('?')[0];
              let cleanBase = currentUrl.endsWith('/') ? currentUrl + 'verification.html' : currentUrl.replace('index.html', 'verification.html');
              if(settingsDb.appScriptUrl) cleanBase = settingsDb.appScriptUrl.trim().replace(/\/$/, "");
              
              const separator = cleanBase.includes("?") ? "&" : "?";
              const finalUrl = `${cleanBase}${separator}vid=${vid}`;
              const newVerif = { month: filterMonth, vid: vid, url: finalUrl };
              
              await window.fs.setDoc(window.fs.doc(window.db, "verifications", filterMonth), newVerif);
              setVerificationsDb(prev => [...prev.filter(v => v.month !== filterMonth), newVerif]);
              Swal.close();
              proceedToPopup(finalUrl);
           } catch(e) {
              Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal membuat verifikasi.', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm', confirmButton: 'w-full bg-brutal-secondary text-black border-2 border-black shadow-brutal font-space font-bold py-3 px-4 rounded-none transition-all hover:-translate-y-1 hover:shadow-brutal-lg mt-4' }, buttonsStyling: false });
           }
        } else {
           proceedToPopup(currentVerif ? currentVerif.url : null);
        }
      };

      const todayRec = attendanceDb.find(a => a.userId === user?.id && a.date === getLocalYYYYMMDD(currentTime));
      const activeRec = todayRec && todayRec.status !== 'Menunggu' ? todayRec : null;
      
      const filteredAttendanceData = attendanceDb.filter(a => a.date.startsWith(filterMonth));
      const currentVerif = verificationsDb.find(v => v.month === filterMonth);
      const hasData = filteredAttendanceData.length > 0;

      if (!user) return (
        <div className="h-screen flex items-center justify-center p-4 bg-brutal-neutral relative overflow-hidden">
          <div className="bg-white p-8 md:p-10 rounded-none shadow-brutal-lg border-4 border-black w-full max-w-sm relative z-10">
            <div className="text-center mb-8">
              <div className="bg-brutal-secondary border-4 border-black w-20 h-20 rounded-none shadow-brutal-sm flex items-center justify-center mx-auto mb-6 rotate-3">
                <i className="fas fa-fingerprint text-black text-4xl -rotate-3"></i>
              </div>
              <h1 className="text-3xl font-syne font-black text-black tracking-tight leading-tight uppercase">{settingsDb.namaInstansi || 'Memuat...'}</h1>
              <p className="text-black mt-2 font-space font-bold uppercase tracking-widest text-xs border-t-2 border-black pt-2 inline-block">Sistem Presensi</p>
            </div>
            <div className="space-y-5 font-inter">
              <input type="text" id="logU" className="w-full px-5 py-4 bg-white border-4 border-black shadow-brutal focus:shadow-brutal-lg focus:-translate-y-0.5 rounded-none focus:outline-none transition-all font-bold text-black placeholder-black/50 text-sm" placeholder="Masukkan Username..." onKeyDown={e => e.key === 'Enter' && handleLoginClick(e.target.value)} />
              <button onClick={() => handleLoginClick(document.getElementById('logU').value)} className="w-full bg-brutal-tertiary text-black border-4 border-black font-space font-bold uppercase tracking-wider py-4 rounded-none shadow-brutal transition-all hover:-translate-y-1 hover:shadow-brutal-lg active:translate-y-0.5 active:shadow-brutal-active text-sm">Masuk Sistem</button>
            </div>
          </div>
        </div>
      );

      if (!isDataReady) return (
        <div className="h-screen flex items-center justify-center bg-brutal-neutral flex-col">
          <div className="bg-white p-8 rounded-none border-4 border-black shadow-brutal-lg flex flex-col items-center">
            <div className="w-12 h-12 border-4 border-black border-t-brutal-secondary rounded-none animate-spin mb-6"></div>
            <p className="font-syne font-black text-black text-2xl uppercase">Memuat...</p>
            <p className="text-sm text-black font-space font-bold mt-2">Menyiapkan data presensi</p>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col lg:flex-row h-screen overflow-hidden">
          
          <nav className="lg:hidden w-full bg-white text-black border-b-4 border-black p-3 z-30 shrink-0">
            <div className="flex items-center justify-between mb-3 px-2 border-b-2 border-black pb-3">
               <div className="flex items-center space-x-2.5">
                 <div className="bg-brutal-secondary border-2 border-black p-2 rounded-none shadow-brutal-sm">
                   <i className="fas fa-fingerprint text-xs text-black"></i>
                 </div>
                 <h2 className="text-sm font-syne font-black tracking-tight uppercase">Sistem Presensi</h2>
               </div>
               
               <div className="flex items-center space-x-3">
                 <div className="text-right hidden xs:block sm:block">
                   <p className="text-xs font-bold text-black font-inter leading-none">{user.name}</p>
                   <p className="text-[10px] font-space font-bold text-black uppercase tracking-widest mt-1 bg-brutal-neutral inline-block px-1 border border-black">{user.role}</p>
                 </div>
                 
                 <button onClick={handleLogout} className="flex items-center gap-1.5 border-2 border-black bg-brutal-error hover:-translate-y-0.5 text-black px-3 py-1.5 rounded-none transition-all active:translate-y-0.5 active:shadow-none shadow-[2px_2px_0_0_#000] shrink-0">
                   <i className="fas fa-power-off text-xs"></i>
                   <span className="text-[10px] font-space font-bold uppercase tracking-wider">Keluar</span>
                 </button>
               </div>
            </div>
            <div className={`grid gap-2 ${user.role === 'admin' ? 'grid-cols-5' : 'grid-cols-3'}`}>
              <button onClick={() => changeMenu('dashboard')} className={`flex flex-col items-center justify-center p-2 rounded-none transition-all border-2 ${activeMenu==='dashboard'?'bg-brutal-secondary border-black shadow-brutal-sm text-black':'border-transparent hover:border-black text-black'}`}>
                <i className="fas fa-home text-base mb-1"></i><span className="text-[10px] font-space font-bold uppercase">Beranda</span>
              </button>
              {user.role === 'client' && (
                <>
                  <button onClick={() => changeMenu('riwayat')} className={`flex flex-col items-center justify-center p-2 rounded-none transition-all border-2 ${activeMenu==='riwayat'?'bg-brutal-secondary border-black shadow-brutal-sm text-black':'border-transparent hover:border-black text-black'}`}>
                    <i className="fas fa-history text-base mb-1"></i><span className="text-[10px] font-space font-bold uppercase">Riwayat</span>

                                  const np = pjs.filter((_, i) => i !== idx);
                                  setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(np)});
                              }} className="w-full h-[50px] bg-brutal-error text-black border-2 border-black hover:-translate-y-0.5 hover:shadow-[2px_2px_0_0_#000] rounded-none transition-all flex items-center justify-center text-lg">
                                <i className="fas fa-trash-alt"></i>
                              </button>
                            </div>
                          </div>
                        ));
                      })()}
                    </div>
                    
                    <button type="submit" disabled={isSavingSettings} className="w-full bg-black text-white border-4 border-black font-space font-bold uppercase tracking-wider py-5 mt-4 rounded-none shadow-[8px_8px_0_0_#ffd23f] transition-all hover:translate-y-1 hover:translate-x-1 hover:shadow-[4px_4px_0_0_#ffd23f] disabled:opacity-50 flex items-center justify-center text-lg">
                      {isSavingSettings ? <><i className="fas fa-spinner fa-spin mr-3"></i> Menyimpan...</> : 'Simpan Semua'}
                    </button>
                  </form>
                </div>
              )}
              
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

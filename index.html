<body class="bg-slate-50 text-slate-800 font-sans antialiased text-sm">
  <div id="root"></div>
  
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const radLat1 = lat1 * Math.PI/180;
      const radLat2 = lat2 * Math.PI/180;
      const deltaLat = (lat2-lat1) * Math.PI/180;
      const deltaLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) + Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function getLocalYYYYMMDD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeForInput(timeStr) {
      if (!timeStr || timeStr === '-') return '';
      return timeStr.replace(/\./g, ':').slice(0, 5);
    }

    const CalendarComponent = ({ userRole, settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb }) => {
      const [viewDate, setViewDate] = useState(new Date());

      const days = useMemo(() => {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        let dateArr = [];
        for (let i = 0; i < firstDay; i++) dateArr.push(null);
        for (let i = 1; i <= lastDate; i++) dateArr.push(new Date(year, month, i));
        return dateArr;
      }, [viewDate]);

      const changeMonth = (offset) => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + offset, 1));

      const handleDateClick = async (date) => {
        if (userRole !== 'admin') return;
        if (!date) return;
        const dateStr = getLocalYYYYMMDD(date);
        
        const dynamicHolidays = holidaysDb.filter(h => h.date === dateStr);
        const formattedDateTitle = date.toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});

        Swal.fire({
          title: `<h2 class="text-lg font-bold text-slate-800">Agenda Hari Libur</h2><p class="text-xs text-slate-400 mt-0.5">${formattedDateTitle}</p>`,
          html: `
            <div class="text-left mt-4 space-y-4">
              <div class="space-y-2">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 px-1">Acara Aktif (${dynamicHolidays.length})</label>
                ${dynamicHolidays.length === 0 
                  ? `<p class="text-xs text-slate-400 italic px-1 py-2 bg-slate-50 rounded-xl text-center border border-dashed border-slate-200">Belum ada agenda libur khusus</p>`
                  : dynamicHolidays.map(h => `
                      <div class="flex items-center justify-between bg-red-50/60 border border-red-100 p-3 rounded-xl">
                        <span class="text-xs font-semibold text-slate-700">${h.description}</span>
                        <button type="button" onclick="window.deleteHolidayEvent(${h.id})" class="w-6 h-6 bg-red-100 hover:bg-red-500 text-red-600 hover:text-white rounded-lg flex items-center justify-center transition-colors shadow-sm">
                          <i class="fas fa-times text-[10px]"></i>
                        </button>
                      </div>
                    `).join('')
                }
              </div>
              <hr class="border-slate-100" />
              <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 flex items-center gap-2">
                <div class="flex-1">
                  <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-0.5">Tambah Acara Baru</label>
                  <input type="text" id="swal-new-holiday" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm placeholder-slate-400" placeholder="Cth: Idul Fitri / Libur Semester">
                </div>
                <button type="button" onclick="window.addHolidayEvent('${dateStr}')" class="w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-xl flex items-center justify-center transition-all active:scale-95 shadow-md shadow-blue-100 shrink-0">
                  <i class="fas fa-plus text-sm"></i>
                </button>
              </div>
            </div>
          `,
          showConfirmButton: false,
          showCancelButton: true,
          cancelButtonText: 'Tutup',
          buttonsStyling: false,
          customClass: {
            popup: 'swal2-minimalist-popup w-[90%] max-w-md',
            cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all text-sm mt-2'
          },
          didOpen: () => {
            window.deleteHolidayEvent = async (id) => {
              Swal.close();
              await window.fs.deleteDoc(window.fs.doc(window.db, "holidays", id.toString()));
              setHolidaysDb(prev => prev.filter(h => h.id !== id));
              handleDateClick(date);
            };

            window.addHolidayEvent = async (targetDate) => {
              const val = document.getElementById('swal-new-holiday').value.trim();
              if (!val) return alert("Keterangan libur tidak boleh kosong!");
              Swal.close();
              const added = { id: Date.now(), date: targetDate, description: val };
              await window.fs.setDoc(window.fs.doc(window.db, "holidays", added.id.toString()), added);
              setHolidaysDb(prev => [...prev, added]);
              handleDateClick(date);
            };
          },
          didClose: () => {
            delete window.deleteHolidayEvent;
            delete window.addHolidayEvent;
          }
        });
      };

      const handleSaveRoutineSettings = async () => {
        setIsSavingSettings(true);
        try {
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), settingsDb);
          setIsSavingSettings(false);
          Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Aturan libur diperbarui.', timer: 1500, showConfirmButton: false });
        } catch (error) {
          setIsSavingSettings(false);
          Swal.fire('Error', 'Gagal menyimpan aturan', 'error');
        }
      };

      const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
      const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';

      return (
        <div className="animate-fadeIn space-y-6">
          <div className="bg-white p-4 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 space-y-4 md:space-y-0">
              <div className="flex items-center justify-between w-full md:w-auto bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                <button onClick={() => changeMonth(-1)} className="p-3 md:p-2 bg-white hover:bg-slate-200 rounded-lg shadow-sm transition-all shrink-0">
                  <i className="fas fa-chevron-left text-slate-600 text-sm"></i>
                </button>
                
                <h3 className="text-base sm:text-lg font-bold text-slate-800 text-center tracking-tight flex-1 md:min-w-[160px]">
                  {viewDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })}
                </h3>
                
                <button onClick={() => changeMonth(1)} className="p-3 md:p-2 bg-white hover:bg-slate-200 rounded-lg shadow-sm transition-all shrink-0">
                  <i className="fas fa-chevron-right text-slate-600 text-sm"></i>
                </button>
              </div>

              {userRole === 'admin' ? (
                <div className="flex items-center space-x-3 bg-slate-50 p-2 rounded-xl border border-slate-200 flex-wrap sm:flex-nowrap gap-y-2">
                  <label className="flex items-center space-x-2 cursor-pointer group px-2">
                    <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" 
                      checked={isLiburMinggu} onChange={e => setSettingsDb({...settingsDb, liburMinggu: e.target.checked ? 'true' : 'false'})} />
                    <span className="text-xs font-bold text-slate-600 group-hover:text-blue-600 transition-colors">Minggu Libur</span>
                  </label>
                  <div className="h-5 w-px bg-slate-300 hidden sm:block"></div>
                  <label className="flex items-center space-x-2 cursor-pointer group px-2">
                    <input type="checkbox" className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" 
                      checked={isLiburSabtu} onChange={e => setSettingsDb({...settingsDb, liburSabtu: e.target.checked ? 'true' : 'false'})} />
                    <span className="text-xs font-bold text-slate-600 group-hover:text-blue-600 transition-colors">Sabtu Libur</span>
                  </label>
                  <button onClick={handleSaveRoutineSettings} disabled={isSavingSettings} 
                    className="sm:ml-2 w-full sm:w-auto bg-slate-800 text-white text-xs px-4 py-2 rounded-lg hover:bg-blue-600 transition-all font-bold shadow-sm disabled:opacity-50">
                    {isSavingSettings ? <i className="fas fa-spinner fa-spin"></i> : 'Update'}
                  </button>
                </div>
              ) : (
                <div className="flex items-center bg-blue-50 text-blue-600 px-4 py-2 rounded-xl border border-blue-100">
                  <i className="fas fa-info-circle mr-2"></i>
                  <span className="text-xs font-bold">Mode Hanya Lihat</span>
                </div>
              )}
            </div>

            <div className="grid grid-cols-7 gap-1 md:gap-2">
              {['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'].map((day, i) => (
                <div key={day} className={`pb-2 text-center text-[10px] font-bold uppercase tracking-wider ${i === 6 ? 'text-red-500' : 'text-slate-400'}`}>
                  {day}
                </div>
              ))}
              {days.map((date, idx) => {
                if (!date) return <div key={`p-${idx}`} className="h-20 sm:h-32 bg-slate-50/50 rounded-xl opacity-40"></div>;
                
                const dateStr = getLocalYYYYMMDD(date);
                const dayOfWeek = date.getDay();
                const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
                
                const specialHolidays = holidaysDb.filter(h => h.date === dateStr);
                const isToday = dateStr === getLocalYYYYMMDD(new Date());

                const dailyRecords = attendanceDb.filter(a => a.date === dateStr && ['Hadir', 'Terlambat'].includes(a.status));
                const attendedNames = dailyRecords.map(r => {
                  const u = usersDb.find(user => user.id === r.userId);
                  return u ? u.username : null; 
                }).filter(Boolean);

                return (
                  <div key={dateStr} onClick={() => handleDateClick(date)}
                    className={`relative h-20 sm:h-32 p-1.5 sm:p-2 rounded-xl border transition-all flex flex-col overflow-hidden
                      ${isToday ? 'border-blue-500 ring-2 ring-blue-100 z-10 bg-white' : 'border-transparent hover:border-slate-300 hover:shadow-sm'}
                      ${isRoutineHoliday || specialHolidays.length > 0 ? 'bg-red-50/30 hover:bg-red-50/60' : 'bg-slate-50 hover:bg-white'}
                      ${userRole === 'admin' ? 'cursor-pointer group' : ''}
                    `}>
                    <div className="flex justify-between items-start mb-1 shrink-0">
                      <span className={`text-xs sm:text-sm font-bold w-5 h-5 sm:w-6 sm:h-6 flex items-center justify-center rounded-full transition-colors z-10
                        ${isToday ? 'bg-blue-600 text-white shadow-sm' : (isRoutineHoliday || specialHolidays.length > 0 ? 'text-red-500' : 'text-slate-700')}
                      `}>{date.getDate()}</span>
                      {specialHolidays.length > 0 && <div className="bg-red-500 w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full animate-pulse shadow-sm shadow-red-300 z-10 mt-1 mr-1 shrink-0"></div>}
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-0.5 z-10 relative text-left min-h-[20px]">
                      {attendedNames.map((name, i) => (
                        <div key={i} className="text-[7px] sm:text-[9px] bg-blue-100/80 text-blue-700 px-1 py-0.5 rounded truncate font-semibold leading-tight">
                          {name}
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-1 z-10 relative shrink-0 pt-1 border-t border-slate-200/50 space-y-0.5">
                      {isRoutineHoliday && specialHolidays.length === 0 && <span className="text-[7px] sm:text-[9px] text-red-400 font-medium uppercase tracking-wider opacity-80 block">Libur</span>}
                      {specialHolidays.map((sh, sIdx) => (
                        <div key={sh.id || sIdx} className="bg-red-500 text-white px-1 py-0.5 rounded shadow-sm">
                          <p className="text-[7px] sm:text-[9px] leading-tight font-medium line-clamp-1">${sh.description}</p>
                        </div>
                      ))}
                    </div>

                    {userRole === 'admin' && (
                      <div className="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/5 transition-colors flex items-center justify-center pointer-events-none">
                        <i className="fas fa-plus-circle text-blue-600 opacity-0 group-hover:opacity-20 text-xl transform scale-50 group-hover:scale-100 transition-all"></i>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="mt-6 flex flex-wrap gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-400 border-t border-slate-100 pt-4 justify-center">
              <div className="flex items-center space-x-1.5"><div className="w-3 h-3 bg-red-500 rounded-full"></div><span>Libur Nasional</span></div>
              <div className="flex items-center space-x-1.5"><div className="w-3 h-3 bg-red-50 border border-red-200 rounded"></div><span>Libur</span></div>
              <div className="flex items-center space-x-1.5"><div className="w-3 h-3 bg-blue-600 rounded-full"></div><span>Hari Ini</span></div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isDataReady, setIsDataReady] = useState(false);
      const [isLocating, setIsLocating] = useState(false); 
      const [isSavingSettings, setIsSavingSettings] = useState(false); 
      
      const [isSystemEmpty, setIsSystemEmpty] = useState(false); 
      const [regForm, setRegForm] = useState({ name: '', username: '' });

      const [user, setUser] = useState(() => {
        try {
          const savedUser = localStorage.getItem('presensi_user');
          return savedUser ? JSON.parse(savedUser) : null; 
        } catch(e) { 
          return null; 
        }
      }); 
      
      const [activeMenu, setActiveMenu] = useState(() => {
        try {
          return localStorage.getItem('presensi_menu') || 'dashboard';
        } catch(e) {
          return 'dashboard';
        }
      });
      
      const [filterMonth, setFilterMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });

      const [usersDb, setUsersDb] = useState([]);
      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]); 
      const [verificationsDb, setVerificationsDb] = useState([]); 
      
      const [settingsDb, setSettingsDb] = useState({
        namaKegiatan: '',
        namaInstansi: 'Memuat...', lokasi: '', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', penanggungJawab: '[]',
        useLocation: 'true', useTime: 'true', alamat: '', desaKecamatan: '', kotaKabupaten: '', negara: 'Indonesia', kodePos: '', appScriptUrl: ''
      });
      const [currentTime, setCurrentTime] = useState(new Date());
      const [newUser, setNewUser] = useState({ name: '', username: '', nim: '' });

      const loadAllSystemData = async () => {
        const [usersSnap, attSnap, holSnap, verSnap, setSnap] = await Promise.all([
          window.fs.getDocs(window.fs.collection(window.db, "users")),
          window.fs.getDocs(window.fs.collection(window.db, "attendance")),
          window.fs.getDocs(window.fs.collection(window.db, "holidays")),
          window.fs.getDocs(window.fs.collection(window.db, "verifications")),
          window.fs.getDocs(window.fs.collection(window.db, "settings"))
        ]);

        let u = usersSnap.docs.map(d => d.data());
        let a = attSnap.docs.map(d => d.data());
        let h = holSnap.docs.map(d => d.data());
        let v = verSnap.docs.map(d => d.data());
        
        let s = {};
        setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });

        if(Object.keys(s).length === 0) {
          s = { namaInstansi: 'Sistem Presensi Default', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', useLocation: 'false', useTime: 'true' };
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), s);
        }

        let pM = s.jamMasuk, pP = s.jamPulang;
        const fix = (t) => { if(!t) return null; const m = String(t).replace(/\./g, ':').match(/(\d{1,2}):(\d{2})/); return m ? `${m[1].padStart(2, '0')}:${m[2]}` : t; };
        
        const finalSettings = { 
          ...settingsDb, 
          ...s, 
          jamMasuk: fix(pM) || '08:00', 
          jamPulang: fix(pP) || '17:00',
          useLocation: s.hasOwnProperty('useLocation') ? String(s.useLocation).toLowerCase() : 'true',
          useTime: s.hasOwnProperty('useTime') ? String(s.useTime).toLowerCase() : 'true',
        };

        const now = new Date();
        const currentYYYYMMDD = getLocalYYYYMMDD(now);
        const currentHm = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
        
        let processedAtt = a.map(record => {
            if (record.status === 'Menunggu') {
                let shouldBeAlpa = false;
                if (record.date < currentYYYYMMDD) {
                    shouldBeAlpa = true;
                } else if (record.date === currentYYYYMMDD) {
                    const pH = parseInt((finalSettings.jamPulang || '17:00').split(':')[0]);
                    const pMin = parseInt((finalSettings.jamPulang || '17:00').split(':')[1]);
                    const cH = parseInt(currentHm.split(':')[0]);
                    const cMin = parseInt(currentHm.split(':')[1]);
                    
                    if (cH > pH || (cH === pH && cMin >= pMin)) {
                        shouldBeAlpa = true;
                    }
                }
                if (shouldBeAlpa) {
                    window.fs.updateDoc(window.fs.doc(window.db, "attendance", record.id.toString()), { status: 'Alpa' }).catch(console.error);
                    return { ...record, status: 'Alpa' };
                }
            }
            return record;
        });

        setSettingsDb(finalSettings);
        setUsersDb(u);
        setHolidaysDb(h);
        setVerificationsDb(v);
        setAttendanceDb(processedAtt);
        return u;
      };

      useEffect(() => {
        const initData = async () => {
          try {
            await window.fs.signInAnonymously(window.auth);

            const usersSnap = await window.fs.getDocs(window.fs.collection(window.db, "users"));
            
            if (usersSnap.empty) {
               setIsSystemEmpty(true);
               setSettingsDb(prev => ({ ...prev, namaInstansi: "Setup Sistem Baru" }));
            } else {
               setIsSystemEmpty(false);
               let savedUserStr = null;
               try { savedUserStr = localStorage.getItem('presensi_user'); } catch(e) {}

               if (savedUserStr) {
                  const parsed = JSON.parse(savedUserStr);
                  const uList = await loadAllSystemData();
                  const validUser = uList.find(user => user.username.toLowerCase() === parsed.username.toLowerCase());
                  
                  if(validUser){
                      setUser(validUser);
                      setIsDataReady(true);
                  } else {
                      try { localStorage.removeItem('presensi_user'); } catch(e) {}
                  }
               } else {
                  const setSnap = await window.fs.getDocs(window.fs.collection(window.db, "settings"));
                  let s = {};
                  setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
                  setSettingsDb(prev => ({ ...prev, namaInstansi: s.namaInstansi || "Sistem Presensi PPL 2" }));
               }
            }
            
            setIsLoading(false);
          } catch (error) {
            console.error(error);
            Swal.fire('Koneksi Gagal', 'Gagal memuat database Firestore.', 'error');

      const handleAddBulkAttendance = () => {

      const performPresensi = async (tipe) => {
        const todayStr = getLocalYYYYMMDD(currentTime);
        const day = currentTime.getDay();
        const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
        const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';

        if ((isLiburMinggu && day === 0) || (isLiburSabtu && day === 6)) return Swal.fire({ title: 'Hari Libur', text:'Hari ini ditetapkan sebagai hari libur.', icon:'info', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }});
        if (holidaysDb.find(h => h.date === todayStr)) return Swal.fire({ title: 'Hari Libur', text:'Hari ini adalah tanggal merah.', icon:'info', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }});

        const executePresensi = async () => {
          const time = currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          
          if (tipe === 'masuk') {
            let late = false;
            if (String(settingsDb.useTime).toLowerCase() === 'true') {
              const b = settingsDb.jamMasuk.split(':'), a = time.split(':');
              late = parseInt(a[0]) > parseInt(b[0]) || (a[0] === b[0] && parseInt(a[1]) > parseInt(b[1]));
            }
            
            let existingUserRec = attendanceDb.find(a => a.userId === user?.id && a.date === todayStr);
            let updatedRec;

            if (existingUserRec) {
                updatedRec = { ...existingUserRec, timeIn: time, status: late ? 'Terlambat' : 'Hadir' };
                await window.fs.updateDoc(window.fs.doc(window.db, "attendance", updatedRec.id.toString()), { timeIn: time, status: updatedRec.status });
            } else {
                updatedRec = { id: Date.now(), userId: user?.id, date: todayStr, timeIn: time, timeOut: null, status: late ? 'Terlambat' : 'Hadir' };
                await window.fs.setDoc(window.fs.doc(window.db, "attendance", updatedRec.id.toString()), updatedRec);
            }

            const newPlaceholders = await ensureAllClientsHaveRecord(todayStr, user?.id);
            const filteredDb = attendanceDb.filter(a => a.id !== (existingUserRec ? existingUserRec.id : null));
            setAttendanceDb([...filteredDb, updatedRec, ...newPlaceholders]);

            Swal.fire({ icon: 'success', title: 'Berhasil Masuk', text: `Presensi dicatat pukul ${time}`, timer: 2000, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          
          } else {
            const activeRec = attendanceDb.find(a => a.userId === user?.id && a.date === todayStr && a.status !== 'Menunggu');
            if(activeRec) {
                const up = attendanceDb.map(r => r.id === activeRec.id ? {...r, timeOut: time} : r);
                setAttendanceDb(up);
                await window.fs.updateDoc(window.fs.doc(window.db, "attendance", activeRec.id.toString()), { timeOut: time });
                Swal.fire({ icon: 'success', title: 'Berhasil Pulang', text: `Sampai jumpa! Dicatat pukul ${time}`, timer: 2000, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            }
          }
        };

        if (String(settingsDb.useLocation).toLowerCase() === 'true') {
          if (!settingsDb.lokasi || settingsDb.lokasi.includes('Memuat')) return Swal.fire({title: 'Error Konfigurasi', text:'Lokasi kantor belum diset.', icon:'warning', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }});
          setIsLocating(true);
          navigator.geolocation.getCurrentPosition(pos => {
            const off = settingsDb.lokasi.split(',');
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, parseFloat(off[0]), parseFloat(off[1]));
            setIsLocating(false);
            if (dist > 100) return Swal.fire({ icon: 'error', title: 'Di Luar Jangkauan', html: `Jarak Anda <b>${Math.round(dist)} meter</b> dari lokasi.<br><span class="text-sm">(Maksimal: 100 meter)</span>`, confirmButtonColor: '#ef4444', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
            executePresensi();
          }, err => { setIsLocating(false); Swal.fire({title: 'GPS Error', text:'Pastikan GPS menyala.', icon:'error', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }}); }, { enableHighAccuracy: true });
        } else executePresensi();
      };

      const performIzinSakit = (tipe) => {
        const todayStr = getLocalYYYYMMDD(currentTime);
        const day = currentTime.getDay();
        const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
        const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';

        if ((isLiburMinggu && day === 0) || (isLiburSabtu && day === 6)) return Swal.fire({ title: 'Hari Libur', text:'Hari ini ditetapkan libur.', icon:'info', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }});
        if (holidaysDb.find(h => h.date === todayStr)) return Swal.fire({ title: 'Hari Libur', text:'Hari ini tanggal merah.', icon:'info', customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' }});

        }).then(async res => {
          if (res.isConfirmed) {

            } else {
                updatedRec = { id: Date.now(), userId: user?.id, date: todayStr, timeIn: time, timeOut: '-', status: tipe };
                await window.fs.setDoc(window.fs.doc(window.db, "attendance", updatedRec.id.toString()), updatedRec);
            }

            const newPlaceholders = await ensureAllClientsHaveRecord(todayStr, user?.id);
            const filteredDb = attendanceDb.filter(a => a.id !== (existingUserRec ? existingUserRec.id : null));
            setAttendanceDb([...filteredDb, updatedRec, ...newPlaceholders]);

            Swal.fire({ icon: 'success', title: 'Berhasil', text: `Status ${tipe} berhasil dicatat.`, timer: 2000, showConfirmButton: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-sm' } });
          }
        });
      };

      const handleDownloadPDF = async () => {
        const defaultDate = currentTime.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        const defaultCity = settingsDb.kotaKabupaten || '';

        Swal.fire({
          title: '<h2 class="text-xl font-bold text-slate-800">Pengaturan Cetak</h2>',
          html: `
            <div class="text-left mt-4 space-y-4">
              <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Kota Tanda Tangan</label>
                <input type="text" id="pdfCity" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm" value="${defaultCity}" placeholder="Cth: Jember">
              </div>
              <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Tanggal Cetak</label>
                <input type="text" id="pdfDate" class="w-full bg-transparent outline-none font-bold text-slate-700 text-sm" value="${defaultDate}">
              </div>
            </div>
          `,
          showCancelButton: true, confirmButtonText: 'Unduh Sekarang', cancelButtonText: 'Batal', buttonsStyling: false,
          customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-md', confirmButton: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all mb-2', cancelButton: 'w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all', actions: 'flex flex-col w-full px-4 pb-4' },
          preConfirm: () => { return { city: document.getElementById('pdfCity').value, date: document.getElementById('pdfDate').value } }
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({ html: '<div class="flex flex-col items-center py-2"><div class="w-10 h-10 border-4 border-slate-100 border-t-red-500 rounded-full animate-spin mb-4"></div><p class="text-slate-600 font-bold text-sm">Menyiapkan PDF...</p></div>', showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'swal2-minimalist-popup w-[90%] max-w-xs' } });

            setTimeout(() => {
              try {
                const { city, date } = result.value;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', format: [210, 330] });

                const [yearStr, monthStr] = filterMonth.split('-');
                const year = parseInt(yearStr);
                const monthIndex = parseInt(monthStr) - 1; 
                const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
                const datesWithActivity = new Set(attendanceDb.map(a => a.date));

                const head = [['No', 'Nama Lengkap']];
                for (let i = 1; i <= daysInMonth; i++) head[0].push(i.toString()); 
                head[0].push('H', 'I', 'S', 'A');

                const colStyles = { 0: { halign: 'center', cellWidth: 8 }, 1: { halign: 'left' } };
                for (let i = 1; i <= daysInMonth; i++) colStyles[i + 1] = { halign: 'center', cellWidth: 7.2 }; 
                
                const body = [];
                const clients = usersDb.filter(u => u.role === 'client');

                clients.forEach((client, index) => {
                  const clientNameNim = client.name + '\n' + (client.nim || '-');
                  const row = [index + 1, clientNameNim];
                  let totalHadir = 0, totalIzin = 0, totalSakit = 0, totalAlpa = 0;

                  for (let d = 1; d <= daysInMonth; d++) {
                    const dayDate = new Date(year, monthIndex, d);
                    const dateStr = getLocalYYYYMMDD(dayDate);
                    const dayOfWeek = dayDate.getDay();
                    const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
                    const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';
                    const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
                    const isSpecialHoliday = holidaysDb.find(h => h.date === dateStr);

                    const record = attendanceDb.find(a => a.userId === client.id && a.date === dateStr);
                    const hasActivityOnDate = datesWithActivity.has(dateStr); 

                    if (record) {
                      if (record.status === 'Hadir' || record.status === 'Terlambat') { row.push(record.status === 'Hadir' ? 'H' : 'T'); totalHadir++; }
                      else if (record.status === 'Izin') { row.push('I'); totalIzin++; }
                      else if (record.status === 'Sakit') { row.push('S'); totalSakit++; }
                      else if (record.status === 'Alpa') { row.push('A'); totalAlpa++; }
                      else { row.push(''); } 
                    } else {
                      if (isRoutineHoliday || isSpecialHoliday) row.push('L');
                      else {
                         if (dayDate <= new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate())) {
                            if (hasActivityOnDate) { row.push('A'); totalAlpa++; } else row.push('');
                         } else row.push('');
                      }
                    }
                  }
                  row.push(totalHadir.toString(), totalIzin.toString(), totalSakit.toString(), totalAlpa.toString());
                  body.push(row);
                });

                const pageWidth = doc.internal.pageSize.getWidth();
                const monthName = new Date(year, monthIndex).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                
                let currentY = 14;

                if (settingsDb.namaKegiatan && settingsDb.namaKegiatan.trim() !== '') {
                  doc.setFontSize(14).setFont("helvetica", "bold").setTextColor(15, 23, 42); 
                  const splitKegiatan = doc.splitTextToSize(settingsDb.namaKegiatan.toUpperCase(), 200);
                  doc.text(splitKegiatan, 8, currentY);
                  currentY += (splitKegiatan.length * 5); 
                }

                doc.setFontSize(14).setFont("helvetica", "bold").setTextColor(15, 23, 42); 
                const splitInstansi = doc.splitTextToSize((settingsDb.namaInstansi || '').toUpperCase(), 200);
                doc.text(splitInstansi, 8, currentY);
                currentY += (splitInstansi.length * 5) + 2; 

                const addressParts = [settingsDb.alamat, settingsDb.desaKecamatan, settingsDb.kotaKabupaten, settingsDb.negara, settingsDb.kodePos].filter(Boolean).join(', ');
                if (addressParts) {
                  doc.setFontSize(8).setFont("helvetica", "normal").setTextColor(100, 100, 100);
                  const splitAddress = doc.splitTextToSize(addressParts, 130); 
                  doc.text(splitAddress, 8, currentY);
                  currentY += (splitAddress.length * 4); 
                }
                const rightTextX = pageWidth - 28;
                doc.setFontSize(12).setFont("helvetica", "bold").setTextColor(15, 23, 42).text("LAPORAN REKAPITULASI PRESENSI", rightTextX, 14, { align: 'right' });
                doc.setFontSize(9).setFont("helvetica", "normal").setTextColor(71, 85, 105).text(`Periode: ${monthName}`, rightTextX, 19, { align: 'right' });
                
                const currentVerifMatch = verificationsDb.find(v => v.month === filterMonth);
                const docId = currentVerifMatch ? currentVerifMatch.vid : `${year}${monthStr}-${Date.now().toString(16).substring(4).toUpperCase()}`;
                doc.setFontSize(8).setFont("helvetica", "bold").setTextColor(100, 100, 100).text(`ID DOKUMEN: ${docId}`, rightTextX, 23, { align: 'right' });

                const lineY = Math.max(29, currentY + 3); 
                doc.setLineWidth(0.5).setDrawColor(226, 232, 240).line(8, lineY, pageWidth - 8, lineY);

                doc.autoTable({
                  startY: lineY + 4, margin: { left: 8, right: 8 }, head: head, body: body, theme: 'grid',
                  styles: { fontSize: 7.5, halign: 'center', valign: 'middle', cellPadding: 1.5, lineColor: [0, 0, 0], lineWidth: 0.1 },
                  headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], fontStyle: 'bold', lineColor: [0, 0, 0], lineWidth: 0.1 },
                  columnStyles: colStyles,
                  didParseCell: function(data) {
                     const isColumnDate = data.column.index > 1 && data.column.index <= daysInMonth + 1;
                     let isHolidayCol = false;
                     if (isColumnDate) {
                        const dayDate = new Date(year, monthIndex, data.column.index - 1);
                        const dateStr = getLocalYYYYMMDD(dayDate);
                        const dayOfWeek = dayDate.getDay();
                        const isLiburMinggu = String(settingsDb.liburMinggu).toLowerCase() === 'true';
                        const isLiburSabtu = String(settingsDb.liburSabtu).toLowerCase() === 'true';
                        isHolidayCol = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu) || holidaysDb.find(h => h.date === dateStr);
                     }
                     if (data.section === 'head') {
                       data.cell.styles.fillColor = [255, 255, 255]; 
                       data.cell.styles.textColor = isHolidayCol ? [220, 38, 38] : [0, 0, 0];
                     }
                     if (data.section === 'body') {
                       if (data.column.index === 0 || data.column.index === 1) { 
                          data.cell.styles.textColor = [15, 23, 42]; 
                          data.cell.styles.fontStyle = 'bold'; 
                          data.cell.styles.fontSize = 8.5; 
                       }
                       if (isColumnDate) {
                         const val = data.cell.raw;
                         if (val === 'H') { data.cell.styles.textColor = [21, 128, 61]; data.cell.styles.fontStyle = 'bold'; }
                         else if (val === 'T') { data.cell.styles.textColor = [234, 88, 12]; data.cell.styles.fontStyle = 'bold'; }
                         else if (val === 'I') { data.cell.styles.textColor = [147, 51, 234]; data.cell.styles.fontStyle = 'bold'; }
                         else if (val === 'S') { data.cell.styles.textColor = [234, 179, 8]; data.cell.styles.fontStyle = 'bold'; }
                         else if (val === 'A') { data.cell.styles.textColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
                         else if (val === 'L' || isHolidayCol) { data.cell.styles.textColor = [255, 255, 255]; data.cell.styles.fillColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
                       } else if (data.column.index >= daysInMonth + 2) {
                          if (data.column.index === daysInMonth + 2) data.cell.styles.textColor = [21, 128, 61]; 
                          if (data.column.index === daysInMonth + 3) data.cell.styles.textColor = [147, 51, 234]; 
                          if (data.column.index === daysInMonth + 4) data.cell.styles.textColor = [234, 179, 8]; 
                          if (data.column.index === daysInMonth + 5) data.cell.styles.textColor = [220, 38, 38]; 
                       }
                     }
                  }
                });

                const finalY = doc.lastAutoTable.finalY || 28;
                doc.setFontSize(8).setTextColor(100, 100, 100);
                doc.text("Keterangan: H (Hadir), T (Terlambat), I (Izin), S (Sakit), A (Alpa/Tidak Hadir), L (Libur)", 14, finalY + 6);

                doc.setFontSize(10).setTextColor(0, 0, 0);
                let signatureY = finalY + 35; 
                
                let pjs = [];
                try { pjs = JSON.parse(settingsDb.penanggungJawab || "[]"); } catch(e) {}
                if (pjs.length === 0) pjs = [{jabatan: 'Penanggung Jawab', nama: '...................................', nip: 'NIP/NIM.'}];

                const nPjs = pjs.length;
                const totalRows = Math.ceil(nPjs / 2);
                const colLeftX = pageWidth * 0.25;
                const colRightX = pageWidth * 0.75;
                const colCenterX = pageWidth * 0.5;

                const mengetahuiX = (nPjs === 1) ? colCenterX : colRightX;
                const locationDateText = city ? `${city}, ${date}` : date;
                doc.text(locationDateText, mengetahuiX, signatureY - 14, { align: "center" });
                doc.text("Mengetahui,", mengetahuiX, signatureY - 8, { align: "center" });

                pjs.forEach((pj, idx) => {
                   let row, colX;
                   if (nPjs % 2 !== 0) { 
                      if (idx === 0) {
                         row = totalRows - 1; 
                         colX = colCenterX;   
                      } else {
                         let pairIndex = Math.ceil(idx / 2);
                         row = totalRows - 1 - pairIndex;                
                         colX = (idx % 2 === 1) ? colRightX : colLeftX; 
                      }
                   } else { 
                      let pairIndex = Math.floor(idx / 2);
                      row = totalRows - 1 - pairIndex;               
                      colX = (idx % 2 === 0) ? colRightX : colLeftX; 
                   }

                   const currentY = signatureY + (row * 35);
                   doc.setFont("helvetica", "normal").text(pj.jabatan || "...................................", colX, currentY, { align: "center" });
                   doc.setFont("helvetica", "bold").text(pj.nama || "...................................", colX, currentY + 20, { align: "center" });
                   doc.setFont("helvetica", "normal").text(pj.nip || "NIP/NIM. ", colX, currentY + 25, { align: "center" });
                });

                const savePDF = () => {
                   doc.save(`Rekap_Presensi_${monthName.replace(' ', '_')}.pdf`);
                   Swal.close();
                };

                if (qrUrlParam) {
                   const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=1&data=${encodeURIComponent(qrUrlParam)}`;
                   const img = new Image();
                   img.crossOrigin = "Anonymous";
                   img.onload = () => {
                       const canvas = document.createElement('canvas');

                       const ctx = canvas.getContext('2d');
                       ctx.drawImage(img, 0, 0);
                       const dataURL = canvas.toDataURL('image/png');
                       doc.addImage(dataURL, 'PNG', pageWidth - 26, 8, 18, 18);
                       savePDF();
                   };
                   img.onerror = () => savePDF();
                   img.src = qrUrl;
                } else {
                   savePDF(); 
                }
              } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Gagal memproses file PDF.', 'error');
              }
            }, 100);

      const monthlyClientSummaries = useMemo(() => {
        const [yearStr, monthStr] = filterMonth.split('-');
        const year = parseInt(yearStr);
        const monthIndex = parseInt(monthStr) - 1;
        const totalDaysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        
        // Cari tanggal mana saja di bulan aktif yang punya aktivitas data di Firestore
        const activeDatesInMonth = new Set(attendanceDb.filter(a => a.date.startsWith(filterMonth)).map(a => a.date));

        return usersDb.filter(u => u.role === 'client').map(client => {
          let countHadir = 0, countIzin = 0, countSakit = 0, countAlpa = 0;
          const recordsThisMonth = attendanceDb.filter(a => a.userId === client.id && a.date.startsWith(filterMonth));

          // Looping tanggal 1 s/d tanggal terakhir bulan tersebut
          for (let d = 1; d <= totalDaysInMonth; d++) {
            const loopDateObj = new Date(year, monthIndex, d);

            const isRoutineHoliday = (dayOfWeek === 0 && isLiburMinggu) || (dayOfWeek === 6 && isLiburSabtu);
            const isSpecialHoliday = holidaysDb.some(h => h.date === dateStr);

            const matchRecord = recordsThisMonth.find(r => r.date === dateStr);

            if (matchRecord) {
              if (['Hadir', 'Terlambat'].includes(matchRecord.status)) countHadir++;
              else if (matchRecord.status === 'Izin') countIzin++;
              else if (matchRecord.status === 'Sakit') countSakit++;
              else if (matchRecord.status === 'Alpa') countAlpa++;
            } else {

              if (!isRoutineHoliday && !isSpecialHoliday && loopDateObj <= new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate())) {
                if (activeDatesInMonth.has(dateStr)) countAlpa++;
              }
            }
          }

          return {
            ...client,
            hadir: countHadir,
            izin: countIzin,
            sakit: countSakit,
            alpa: countAlpa
          };
        });

                  <div className="flex justify-between items-center mb-4">
                    <h4 className="text-sm font-bold text-slate-800 flex items-center"><i className="fas fa-pen-nib mr-2 text-blue-500"></i> Penanggung Jawab Laporan</h4>
                    <button type="button" onClick={() => { let currentPjs = []; try { currentPjs = JSON.parse(settingsDb.penanggungJawab || "[]"); } catch(e) {} currentPjs.push({jabatan: '', nama: '', nip: ''}); setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(currentPjs)}); }} className="bg-blue-100 text-blue-600 hover:bg-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors"><i className="fas fa-plus mr-1"></i> Tambah PJ</button>
                  </div>
                  {(() => {
                    let pjs = []; try { pjs = JSON.parse(settingsDb.penanggungJawab || "[]"); } catch(e) {}
                    if (pjs.length === 0) return <p className="text-xs text-slate-400 italic mb-4">Belum ada penanggung jawab. Klik tombol tambah.</p>;
                    return pjs.map((pj, idx) => (
                      <div key={idx} className="grid grid-cols-1 sm:grid-cols-12 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200 mb-3 relative group">
                        <div className="sm:col-span-4">
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5 ml-1">Jabatan</label>
                          <input type="text" value={pj.jabatan} onChange={e => { const np = [...pjs]; np[idx].jabatan = e.target.value; setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(np)}) }} placeholder="Cth: Kepala Sekolah" className="w-full bg-white border border-slate-200 px-3 py-2 rounded-lg font-normal text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                        <div className="sm:col-span-4">
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5 ml-1">Nama Lengkap</label>
                          <input type="text" value={pj.nama} onChange={e => { const np = [...pjs]; np[idx].nama = e.target.value; setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(np)}) }} placeholder="Cth: Budi Santoso, M.Pd" className="w-full bg-white border border-slate-200 px-3 py-2 rounded-lg font-semibold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                        <div className="sm:col-span-3">
                          <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5 ml-1">NIP / NIM / Kustom</label>
                          <input type="text" value={pj.nip} onChange={e => { const np = [...pjs]; np[idx].nip = e.target.value; setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(np)}) }} placeholder="Cth: NIP. 1980..." className="w-full bg-white border border-slate-200 px-3 py-2 rounded-lg font-semibold text-sm text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none"/>
                        </div>
                        <div className="sm:col-span-1 flex flex-col justify-end">
                          <button type="button" onClick={() => { const np = pjs.filter((_, i) => i !== idx); setSettingsDb({...settingsDb, penanggungJawab: JSON.stringify(np)}); }} className="w-full h-[38px] bg-red-100 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-colors flex items-center justify-center"><i className="fas fa-trash-alt"></i></button>
                        </div>
                      </div>
                    ));
                  })()}
                </div>
                <button type="submit" className="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 mt-2 rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center text-sm">Simpan Pengaturan</button>
              </form>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

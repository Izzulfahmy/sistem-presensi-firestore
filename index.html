<body class="text-black selection:bg-nb-secondary antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const radLat1 = lat1 * Math.PI/180;
      const radLat2 = lat2 * Math.PI/180;
      const deltaLat = (lat2-lat1) * Math.PI/180;
      const deltaLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) + Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function getLocalYYYYMMDD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeForInput(timeStr) {
      if (!timeStr || timeStr === '-') return '';
      return timeStr.replace(/\./g, ':').slice(0, 5);
    }

    /* KONTEN KALENDER NEUBRUTALISM */
    const CalendarComponent = ({ userRole, settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb }) => {
      const [viewDate, setViewDate] = useState(new Date());

      const days = useMemo(() => {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        let firstDay = new Date(year, month, 1).getDay() - 1;
        if (firstDay === -1) firstDay = 6;
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        let dateArr = [];
        for (let i = 0; i < firstDay; i++) dateArr.push(null);
        for (let i = 1; i <= lastDate; i++) dateArr.push(new Date(year, month, i));
        return dateArr;
      }, [viewDate]);

      const changeMonth = (offset) => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + offset, 1));

      const handleDateClick = async (date) => {
        if (userRole !== 'admin') return;
        if (!date) return;
        if (!window.db || !window.fs) return Swal.fire('Error', 'Database offline', 'error');

        const dateStr = getLocalYYYYMMDD(date);
        const existing = holidaysDb.find(h => h.date === dateStr);

        if (existing) {
          Swal.fire({
            title: 'HAPUS LIBUR?',
            text: `Hapus agenda libur: "${existing.description}"?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'YA, HAPUS',
            cancelButtonText: 'BATAL',
            confirmButtonColor: '#ff4d4d',
            customClass: { popup: 'swal2-minimalist-popup' }
          }).then(async res => {
            if (res.isConfirmed) {
              await window.fs.deleteDoc(window.fs.doc(window.db, "holidays", existing.id.toString()));
              setHolidaysDb(prev => prev.filter(h => h.id !== existing.id));
            }
          });
        } else {
          Swal.fire({
            title: 'TAMBAH HARI LIBUR',
            input: 'text',
            inputPlaceholder: 'Keterangan agenda libur...',
            showCancelButton: true,
            confirmButtonText: 'SIMPAN',
            cancelButtonText: 'BATAL',
            confirmButtonColor: '#ffd23f',
            customClass: { popup: 'swal2-minimalist-popup' },
            inputValidator: (value) => { if (!value) return 'Keterangan tidak boleh kosong!'; }
          }).then(async res => {
            if (res.isConfirmed) {
              const added = { id: Date.now(), date: dateStr, description: res.value };
              await window.fs.setDoc(window.fs.doc(window.db, "holidays", added.id.toString()), added);
              setHolidaysDb(prev => [...prev, added]);
            }
          });
        }
      };

      const handleSaveRoutineSettings = async () => {
        if (!window.db || !window.fs) return Swal.fire('Error', 'Database offline', 'error');
        setIsSavingSettings(true);
        try {
          await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), settingsDb);
          setIsSavingSettings(false);
          Swal.fire({ icon: 'success', title: 'BERHASIL', text: 'Aturan rutin libur diperbarui.', customClass: { popup: 'swal2-minimalist-popup' } });
        } catch (error) {
          setIsSavingSettings(false);
          Swal.fire('Error', 'Gagal menyimpan aturan', 'error');
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-nb-surface border-4 border-black p-4 md:p-6 nb-box-shadow">
            <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
              <div className="flex items-center justify-between border-4 border-black bg-nb-neutral p-1.5 w-full md:w-auto">
                <button onClick={() => changeMonth(-1)} className="p-2 border-2 border-black bg-white hover:bg-nb-secondary nb-button-active font-bold">
                  <i className="fas fa-chevron-left"></i>
                </button>
                <h3 className="font-grotesk font-bold text-lg md:text-xl px-6 text-center uppercase tracking-tight">
                  {viewDate.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })}
                </h3>
                <button onClick={() => changeMonth(1)} className="p-2 border-2 border-black bg-white hover:bg-nb-secondary nb-button-active font-bold">
                  <i className="fas fa-chevron-right"></i>
                </button>
              </div>

              {userRole === 'admin' ? (
                <div className="flex items-center border-4 border-black bg-nb-neutral p-2 flex-wrap sm:flex-nowrap gap-4">
                  <label className="flex items-center space-x-2 cursor-pointer font-bold text-xs uppercase">
                    <input type="checkbox" className="w-4 h-4 rounded-none border-2 border-black text-black focus:ring-0" 
                      checked={String(settingsDb.liburMinggu).toLowerCase() === 'true'} onChange={e => setSettingsDb({...settingsDb, liburMinggu: e.target.checked ? 'true' : 'false'})} />
                    <span>Minggu Libur</span>
                  </label>
                  <label className="flex items-center space-x-2 cursor-pointer font-bold text-xs uppercase">
                    <input type="checkbox" className="w-4 h-4 rounded-none border-2 border-black text-black focus:ring-0" 
                      checked={String(settingsDb.liburSabtu).toLowerCase() === 'true'} onChange={e => setSettingsDb({...settingsDb, liburSabtu: e.target.checked ? 'true' : 'false'})} />
                    <span>Sabtu Libur</span>
                  </label>
                  <button onClick={handleSaveRoutineSettings} disabled={isSavingSettings} 
                    className="w-full sm:w-auto bg-nb-secondary border-2 border-black text-xs font-black uppercase px-4 py-1.5 nb-button-active shadow-[2px_2px_0px_0px_#000000]">
                    {isSavingSettings ? 'PROSES...' : 'UPDATE'}
                  </button>
                </div>
              ) : (
                <div className="border-4 border-black bg-nb-cyan px-4 py-2 font-grotesk font-bold text-xs uppercase">
                  <i className="fas fa-info-circle mr-2"></i>Mode Hanya Lihat
                </div>
              )}
            </div>

            <div className="grid grid-cols-7 gap-2">
              {['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'].map((day, i) => (
                <div key={day} className={`p-2 text-center font-grotesk font-bold text-xs uppercase border-2 border-black bg-nb-primary text-white`}>
                  {day}
                </div>
              ))}
              {days.map((date, idx) => {
                if (!date) return <div key={`p-${idx}`} className="h-20 sm:h-28 bg-nb-neutral/30 border-2 border-dashed border-black/20"></div>;
                
                const dateStr = getLocalYYYYMMDD(date);
                const dayOfWeek = date.getDay();
                const isRoutineHoliday = (dayOfWeek === 0 && String(settingsDb.liburMinggu).toLowerCase() === 'true') || (dayOfWeek === 6 && String(settingsDb.liburSabtu).toLowerCase() === 'true');
                const specialHoliday = holidaysDb.find(h => h.date === dateStr);
                const isToday = dateStr === getLocalYYYYMMDD(new Date());

                const dailyRecords = attendanceDb.filter(a => a.date === dateStr && ['Hadir', 'Terlambat'].includes(a.status));
                const attendedNames = dailyRecords.map(r => {
                  const u = usersDb.find(user => user.id === r.userId);
                  return u ? u.username : null; 
                }).filter(Boolean);

                return (
                  <div key={dateStr} onClick={() => handleDateClick(date)}
                    className={`h-20 sm:h-28 p-1.5 border-2 border-black flex flex-col justify-between transition-all relative group
                      ${isToday ? 'bg-nb-secondary ring-4 ring-black z-10' : 'bg-white hover:bg-nb-neutral'}
                      ${isRoutineHoliday || specialHoliday ? 'bg-nb-tertiary/40' : ''}
                      ${userRole === 'admin' ? 'cursor-pointer' : ''}
                    `}>
                    <div className="flex justify-between items-center">
                      <span className={`text-xs sm:text-sm font-black border-2 border-black w-6 h-6 flex items-center justify-center bg-white`}>
                        {date.getDate()}
                      </span>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar py-1 space-y-0.5 max-h-[40px] sm:max-h-[55px]">
                      {attendedNames.map((name, i) => (
                        <div key={i} className="text-[8px] sm:text-[9px] bg-white border border-black px-1 font-bold truncate">
                          ✓ {name}
                        </div>
                      ))}
                    </div>
                    
                    <div className="w-full">
                      {isRoutineHoliday && !specialHoliday && <span className="text-[8px] bg-black text-white px-1 font-bold uppercase tracking-wider block text-center">LIBUR</span>}
                      {specialHoliday && <div className="bg-nb-tertiary border border-black text-black px-1 text-[8px] font-bold uppercase truncate">{specialHoliday.description}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    /* MAIN APP CORES */
    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isDataReady, setIsDataReady] = useState(false);
      const [isLocating, setIsLocating] = useState(false); 
      const [isSavingSettings, setIsSavingSettings] = useState(false); 
      
      const [user, setUser] = useState(() => {
        const savedUser = localStorage.getItem('presensi_user');
        try { return savedUser ? JSON.parse(savedUser) : null; } catch(e) { return null; }
      }); 
      
      const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('presensi_menu') || 'dashboard');
      const [filterMonth, setFilterMonth] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });

      const [usersDb, setUsersDb] = useState([]);
      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]); 
      const [verificationsDb, setVerificationsDb] = useState([]); 
      
      const [settingsDb, setSettingsDb] = useState({
        namaKegiatan: '', namaInstansi: 'SISTEM PRESENSI', lokasi: '', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', penanggungJawab: '[]',
        useLocation: 'true', useTime: 'true', alamat: '', desaKecamatan: '', kotaKabupaten: '', negara: 'Indonesia', kodePos: '', appScriptUrl: ''
      });
      const [currentTime, setCurrentTime] = useState(new Date());
      const [newUser, setNewUser] = useState({ name: '', username: '', nim: '' });

      useEffect(() => {
        const initData = async () => {
          if (!window.db || !window.fs) {
            console.warn("Firebase offline mode fallback.");
            setIsDataReady(true);
            setIsLoading(false);
            return;
          }

          try {
            const [usersSnap, attSnap, holSnap, verSnap, setSnap] = await Promise.all([
              window.fs.getDocs(window.fs.collection(window.db, "users")),
              window.fs.getDocs(window.fs.collection(window.db, "attendance")),
              window.fs.getDocs(window.fs.collection(window.db, "holidays")),
              window.fs.getDocs(window.fs.collection(window.db, "verifications")),
              window.fs.getDocs(window.fs.collection(window.db, "settings"))
            ]);

            let u = usersSnap.docs.map(d => d.data());
            let a = attSnap.docs.map(d => d.data());
            let h = holSnap.docs.map(d => d.data());
            let v = verSnap.docs.map(d => d.data());
            
            let s = {};
            setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });

            if (u.length === 0) {
              const defaultAdmin = { id: 1, name: 'Administrator', username: 'admin', role: 'admin', nim: 'HRD' };
              await window.fs.setDoc(window.fs.doc(window.db, "users", "1"), defaultAdmin);
              u.push(defaultAdmin);
            }

            if(Object.keys(s).length === 0) {
              s = { namaInstansi: 'Sistem Presensi Neubrutalism', jamMasuk: '08:00', jamPulang: '17:00', liburMinggu: 'true', liburSabtu: 'false', useLocation: 'false', useTime: 'true' };
              await window.fs.setDoc(window.fs.doc(window.db, "settings", "config"), s);
            }

            setSettingsDb(prev => ({ ...prev, ...s }));
            setUsersDb(u);
            setHolidaysDb(h);
            setVerificationsDb(v);
            setAttendanceDb(a);
            
            setIsDataReady(true);
            setIsLoading(false);
          } catch (error) {
            console.error(error);
            setIsDataReady(true);
            setIsLoading(false);
          }
        };

        if (window.db && window.fs) initData();
        else window.addEventListener('firebase-ready', initData, {once: true});

        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const changeMenu = (menuName) => {
        setActiveMenu(menuName);
        localStorage.setItem('presensi_menu', menuName);
      };

      const handleLoginClick = async (username) => {
        if (!username) return Swal.fire({ icon: 'warning', title: 'ERROR', text: 'Username wajib diisi!', customClass: { popup: 'swal2-minimalist-popup' }});
        
        if (!window.db || !window.fs) {
          if (username === 'admin') {
            const mock = { id: 1, name: 'Offline Admin', username: 'admin', role: 'admin', nim: 'HRD' };
            setUser(mock);
            changeMenu('dashboard');
          }
          return;
        }

        try {
          const found = usersDb.find(u => u.username === username);
          if (found) {
            setUser(found);
            localStorage.setItem('presensi_user', JSON.stringify(found));
            changeMenu('dashboard');
          } else {
            Swal.fire({ icon: 'error', title: 'DITOLAK', text: 'Username tidak terdaftar.', customClass: { popup: 'swal2-minimalist-popup' } });
          }
        } catch(e) {
          Swal.fire('Error', 'Gagal memproses otentikasi', 'error');
        }
      };

      const handleLogout = () => {
        setUser(null);
        localStorage.clear();
      };

      const handleAddUser = async (e) => {
        e.preventDefault();
        if(!newUser.name || !newUser.username) return;
        const added = { ...newUser, id: Date.now(), role: 'client' };
        await window.fs.setDoc(window.fs.doc(window.db, "users", added.id.toString()), added);
        setUsersDb(prev => [...prev, added]);
        setNewUser({ name: '', username: '', nim: '' });
      };

      const performPresensi = async (tipe) => {
        if (!window.db || !window.fs) return;
        const todayStr = getLocalYYYYMMDD(currentTime);
        const time = currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (tipe === 'masuk') {
          const addedRec = { id: Date.now(), userId: user.id, date: todayStr, timeIn: time, timeOut: null, status: 'Hadir' };
          await window.fs.setDoc(window.fs.doc(window.db, "attendance", addedRec.id.toString()), addedRec);
          setAttendanceDb(prev => [...prev, addedRec]);
        } else {
          const active = attendanceDb.find(a => a.userId === user.id && a.date === todayStr);
          if (active) {
            await window.fs.updateDoc(window.fs.doc(window.db, "attendance", active.id.toString()), { timeOut: time });
            setAttendanceDb(prev => prev.map(a => a.id === active.id ? {...a, timeOut: time} : a));
          }
        }
        Swal.fire({ icon: 'success', title: 'SUKSES', text: `Presensi dicatat pukul ${time}`, customClass: { popup: 'swal2-minimalist-popup' } });
      };

      // GUARD LOGIN SCREEN (GAYA NEUBRUTALISM TOTAL)
      if (!user) return (
        <div className="h-screen flex items-center justify-center p-4 bg-nb-neutral">
          <div className="bg-nb-surface border-4 border-black p-8 max-w-sm w-full nb-box-shadow-lg relative">
            <div className="border-4 border-black bg-nb-secondary p-4 mb-6 text-center">
              <i className="fas fa-fingerprint text-4xl mb-2"></i>
              <h1 className="font-syne font-black text-xl tracking-tight uppercase">{settingsDb.namaInstansi}</h1>
              <p className="font-grotesk font-bold text-[10px] tracking-widest uppercase mt-1">PRESENSI PORTAL</p>
            </div>
            <div className="space-y-4">
              <input type="text" id="logU" className="w-full p-3 border-4 border-black bg-white font-mono text-sm outline-none focus:bg-nb-neutral" placeholder="USERNAME..." onKeyDown={e => e.key === 'Enter' && handleLoginClick(e.target.value)} />
              <button onClick={() => handleLoginClick(document.getElementById('logU').value)} className="w-full bg-nb-cyan border-4 border-black font-grotesk font-black uppercase py-3 nb-button-active nb-box-shadow text-sm">MASUK SISTEM →</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col lg:flex-row h-screen overflow-hidden bg-nb-neutral">
          {/* SIDEBAR / NAV BAR BARU */}
          <aside className="w-full lg:w-64 border-b-4 lg:border-b-0 lg:border-r-4 border-black bg-white flex flex-col shrink-0">
            <div className="p-4 border-b-4 border-black bg-nb-secondary flex items-center space-x-3">
              <div className="border-2 border-black bg-white p-1.5"><i className="fas fa-bolt text-sm"></i></div>
              <h2 className="font-syne font-black tracking-tight text-md uppercase">CORE PANEL</h2>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => changeMenu('dashboard')} className={`w-full text-left font-grotesk font-black uppercase px-4 py-3 border-2 border-black nb-button-active block ${activeMenu==='dashboard'?'bg-nb-cyan shadow-[2px_2px_0px_0px_#000000]':'bg-white hover:bg-nb-neutral'}`}>BERANDA</button>
              {user.role === 'admin' && (
                <>
                  <button onClick={() => changeMenu('data client')} className={`w-full text-left font-grotesk font-black uppercase px-4 py-3 border-2 border-black nb-button-active block ${activeMenu==='data client'?'bg-nb-cyan shadow-[2px_2px_0px_0px_#000000]':'bg-white hover:bg-nb-neutral'}`}>DATA CLIENT</button>
                  <button onClick={() => changeMenu('kalender')} className={`w-full text-left font-grotesk font-black uppercase px-4 py-3 border-2 border-black nb-button-active block ${activeMenu==='kalender'?'bg-nb-cyan shadow-[2px_2px_0px_0px_#000000]':'bg-white hover:bg-nb-neutral'}`}>ATUR LIBUR</button>
                </>
              )}
            </nav>
            <div className="p-4 border-t-4 border-black bg-nb-neutral">
              <button onClick={handleLogout} className="w-full text-center font-grotesk font-black uppercase py-2 bg-nb-tertiary border-2 border-black text-xs nb-button-active shadow-[2px_2px_0px_0px_#000000]">KELUAR SYSTEM</button>
            </div>
          </aside>

          {/* MAIN CONTAINER */}
          <main className="flex-1 overflow-y-auto p-4 md:p-8">
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center border-4 border-black p-4 bg-white nb-box-shadow mb-8 gap-4">
              <div>
                <h1 className="font-syne font-black text-2xl md:text-3xl tracking-tight uppercase leading-none">{activeMenu}</h1>
                <p className="font-grotesk font-bold text-xs text-slate-500 uppercase tracking-wider mt-1">{settingsDb.namaInstansi}</p>
              </div>
              <div className="border-4 border-black bg-nb-secondary px-4 py-2 font-mono font-bold text-sm tracking-tight nb-box-shadow">
                {currentTime.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}
              </div>
            </header>

            {activeMenu === 'kalender' && (
              <CalendarComponent userRole={user.role} {...{settingsDb, setSettingsDb, holidaysDb, setHolidaysDb, isSavingSettings, setIsSavingSettings, attendanceDb, usersDb}} />
            )}

            {activeMenu === 'dashboard' && user.role === 'client' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-white border-4 border-black p-6 nb-box-shadow flex flex-col items-center text-center">
                  <div className="bg-nb-secondary w-16 h-14 border-2 border-black flex items-center justify-center font-bold mb-4">
                    <i className="fas fa-fingerprint text-2xl"></i>
                  </div>
                  <h2 className="font-grotesk font-black text-xl uppercase mb-1">{user.name}</h2>
                  <p className="text-xs font-mono text-slate-500 mb-6">{user.nim || 'NO-NIM'}</p>

                  <div className="w-full space-y-3">
                    <button onClick={() => performPresensi('masuk')} className="w-full bg-nb-cyan border-4 border-black font-grotesk font-black uppercase py-3 text-base nb-button-active nb-box-shadow">PRESENSI MASUK</button>
                    <button onClick={() => performPresensi('pulang')} className="w-full bg-nb-tertiary border-4 border-black font-grotesk font-black uppercase py-3 text-base nb-button-active nb-box-shadow">PRESENSI PULANG</button>
                  </div>
                </div>

                <div className="bg-nb-primary text-white border-4 border-black p-6 nb-box-shadow flex flex-col justify-between">
                  <h3 className="font-grotesk font-black text-lg uppercase mb-4 text-nb-secondary border-b border-white/20 pb-2">Log Aktivitas Hari Ini</h3>
                  <div className="space-y-3 flex-1 flex flex-col justify-center">
                    <div className="flex justify-between items-center bg-white/10 p-3 border border-white/20">
                      <span className="font-bold text-xs uppercase">Status Kehadiran</span>
                      <span className="font-mono text-xs bg-nb-secondary text-black px-2 py-0.5 font-bold">TERCATAT</span>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeMenu === 'data client' && user.role === 'admin' && (
              <div className="space-y-6">
                <div className="bg-white border-4 border-black p-6 nb-box-shadow">
                  <h3 className="font-grotesk font-black text-md uppercase mb-4">Registrasi Anggota Baru</h3>
                  <form onSubmit={handleAddUser} className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                    <input type="text" required value={newUser.name} onChange={e=>setNewUser({...newUser, name:e.target.value})} className="p-2 border-2 border-black bg-nb-neutral font-medium text-sm" placeholder="NAMA LENGKAP"/>
                    <input type="text" required value={newUser.username} onChange={e=>setNewUser({...newUser, username:e.target.value})} className="p-2 border-2 border-black bg-nb-neutral font-medium text-sm" placeholder="USERNAME"/>
                    <button type="submit" className="bg-nb-secondary border-2 border-black font-grotesk font-black uppercase py-2 nb-button-active shadow-[2px_2px_0px_0px_#000000]">DAFTARKAN</button>
                  </form>
                </div>

                <div className="bg-white border-4 border-black nb-box-shadow overflow-hidden">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-nb-primary text-white font-grotesk font-bold text-xs uppercase border-b-2 border-black">
                        <th className="p-3">Nama</th>
                        <th className="p-3">Username</th>
                        <th className="p-3 text-right">Peran</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-black/10 font-medium text-sm">
                      {usersDb.filter(u=>u.role==='client').map(u=>(
                        <tr key={u.id} className="hover:bg-nb-neutral/50">
                          <td className="p-3 font-bold">{u.name}</td>
                          <td className="p-3 font-mono text-xs">{u.username}</td>
                          <td className="p-3 text-right font-grotesk font-bold text-xs uppercase text-slate-500">{u.role}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Resmi - Neubrutalism Style</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            neoYellow: '#ffd23f',
            neoCoral: '#ff6b6b',
            neoNeutral: '#fffdf5',
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #fffdf5; }
    h1, h2, h3, th { font-family: 'Space Grotesk', sans-serif; }
    @media print {
      .no-print { display: none !important; }
      body { background-color: white !important; }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    try {
      const firebaseConfig = {
        apiKey: "AIzaSyAfkqKKgX5WqFMZ-wUI0RIjmZyahrD1uWg",
        authDomain: "sistem-presensi-96dae.firebaseapp.com",
        projectId: "sistem-presensi-96dae",
        storageBucket: "sistem-presensi-96dae.firebasestorage.app",
        messagingSenderId: "444659307342",
        appId: "1:444659307342:web:b1f8b7833f76a43ec8c41f",
        measurementId: "G-XDXXMENG8X"
      };

      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
      window.fs = { collection, getDocs };
    } catch (e) {
      console.error("Firebase Verification Inits Error: ", e);
    } finally {
      window.dispatchEvent(new Event('firebase-ready'));
    }
  </script>
</head>
<body class="text-black antialiased selection:bg-neoYellow/50">
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let targetMonthParam = urlParams.get('month') || "";
    const vidParam = urlParams.get('vid');
    
    if (!targetMonthParam && vidParam && vidParam.length >= 6) {
       targetMonthParam = vidParam.substring(0, 4) + '-' + vidParam.substring(4, 6);
    }
    window.TARGET_MONTH = targetMonthParam;
    window.VID_PARAM = vidParam || "-";
  </script>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function getLocalYYYYMMDD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function VerificationApp() {
      const [isLoading, setIsLoading] = useState(true);
      const [settingsDb, setSettingsDb] = useState({});
      const [usersDb, setUsersDb] = useState([]);
      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]);
      
      const targetValid = window.TARGET_MONTH && window.TARGET_MONTH.length > 0 && window.TARGET_MONTH.includes('-');
      const [yearStr, monthStr] = targetValid 
        ? window.TARGET_MONTH.split('-') 
        : [new Date().getFullYear().toString(), String(new Date().getMonth() + 1).padStart(2, '0')];
        
      const year = parseInt(yearStr);
      const monthIndex = parseInt(monthStr) - 1; 
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

      useEffect(() => {
        const initData = async () => {
          if(!window.db || !window.fs) { setIsLoading(false); return; }
          try {
            const [usersSnap, attSnap, holSnap, setSnap] = await Promise.all([
              window.fs.getDocs(window.fs.collection(window.db, "users")),
              window.fs.getDocs(window.fs.collection(window.db, "attendance")),
              window.fs.getDocs(window.fs.collection(window.db, "holidays")),
              window.fs.getDocs(window.fs.collection(window.db, "settings"))
            ]);

            setUsersDb(usersSnap.docs.map(d => d.data()));
            setAttendanceDb(attSnap.docs.map(d => d.data()));
            setHolidaysDb(holSnap.docs.map(d => d.data()));
            
            let s = {};
            setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
            setSettingsDb(s);
            setIsLoading(false);
          } catch (error) {
            setIsLoading(false);
          }
        };

        if (window.db && window.fs) initData();
        else window.addEventListener('firebase-ready', initData, {once: true});
      }, []);

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center flex-col">
            <div className="w-8 h-8 border-4 border-black border-t-neoYellow animate-spin mb-2"></div>
            <p className="font-mono text-xs uppercase font-black">MEMUAT VERIFIKASI DOKUMEN...</p>
          </div>
        );
      }

      const clients = usersDb.filter(u => u.role === 'client');
      const monthName = new Date(year, monthIndex).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
      const displayVid = window.VID_PARAM !== "-" ? window.VID_PARAM : `${year}${monthStr}-OFFLINE`;

      return (
        <div className="min-h-screen py-8 px-4 sm:px-6 lg:px-8 print:py-0 print:px-0">
          <div className="max-w-5xl mx-auto bg-white border-4 border-black p-6 sm:p-10 shadow-[8px_8px_0px_0px_#000000] print:shadow-none">
            
            <div className="flex flex-col md:flex-row justify-between items-start gap-6 pb-6 border-b-4 border-black mb-6">
              <div>
                <h1 className="text-2xl md:text-3xl font-black uppercase tracking-tight">{settingsDb.namaInstansi || 'REKAPITULASI DOKUMEN'}</h1>
                <p className="text-sm font-bold text-gray-600 mt-1">{settingsDb.alamat || 'Alamat Belum Dikonfigurasi'}</p>
              </div>

              <div className="bg-neoYellow border-2 border-black p-3 font-mono font-black text-xs uppercase shadow-[3px_3px_0px_0px_#000000]">
                <div className="mb-1">✓ STATUS VERIFIKASI RESMI</div>
                <div className="text-gray-700">ID: {displayVid}</div>
              </div>
            </div>

            <div className="bg-neoNeutral border-4 border-black p-4 mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
              <div>
                <h2 className="text-lg font-black uppercase">REKAPITULASI PRESENSI BULANAN</h2>
                <p className="text-xs text-gray-500 font-bold">Data disinkronkan secara aman dari pangkalan data sistem.</p>
              </div>
              <span className="bg-black text-white px-4 py-2 font-black text-sm uppercase tracking-wider">{monthName}</span>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse border-4 border-black">
                <thead>
                  <tr className="bg-black text-white text-[10px] font-black uppercase tracking-wider">
                    <th className="p-2 border-r border-white text-center w-10">No</th>
                    <th className="p-2 border-r border-white">Nama</th>
                    {Array.from({ length: daysInMonth }, (_, i) => (
                      <th key={i} className="p-1 border-r border-white text-center w-6">{i + 1}</th>
                    ))}
                    <th className="p-2 text-center bg-green-900 text-white">H</th>
                  </tr>
                </thead>
                <tbody className="text-xs font-bold divide-y border-black">
                  {clients.map((client, idx) => {
                    let totalH = 0;
                    return (
                      <tr key={client.id} className="hover:bg-neoNeutral">
                        <td className="p-2 border-r border-black text-center">{idx + 1}</td>
                        <td className="p-2 border-r border-black font-black whitespace-nowrap">{client.name}</td>
                        {Array.from({ length: daysInMonth }, (_, d) => {
                          const dateStr = `${year}-${monthStr}-${String(d + 1).padStart(2, '0')}`;
                          const rec = attendanceDb.find(a => a.userId === client.id && a.date === dateStr);
                          if(rec && ['Hadir', 'Terlambat'].includes(rec.status)) { totalH++; return <td key={d} className="p-1 border-r border-black text-center bg-green-100 text-green-800">H</td>; }
                          return <td key={d} className="p-1 border-r border-black text-center">-</td>;
                        })}
                        <td className="p-2 text-center bg-neoYellow font-black">{totalH}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="mt-8 pt-6 border-t-4 border-black no-print text-center">
              <button onClick={() => window.print()} className="bg-black text-white font-black uppercase px-8 py-3 border-2 border-black hover:bg-neoYellow hover:text-black shadow-[4px_4px_0px_0px_#000000] active:translate-y-1 active:shadow-none transition-all text-xs tracking-widest">
                <i className="fas fa-print mr-2"></i> Cetak Laporan Fisik
              </button>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VerificationApp />);
  </script>
</body>
</html>

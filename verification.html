<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Laporan Presensi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brutal: { primary: '#000000', secondary: '#ffd23f', tertiary: '#ff6b6b', neutral: '#fffdf5', surface: '#ffffff', error: '#ff4d4d', cyan: '#7fdde0' }
          },
          fontFamily: { syne: ['Syne', 'sans-serif'], space: ['Space Grotesk', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
          boxShadow: {
            brutal: '4px 4px 0px 0px #000000',
            'brutal-lg': '12px 12px 0px 0px #000000',
            'brutal-sm': '2px 2px 0px 0px #000000',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #fffdf5; border-left: 2px solid #000; border-top: 2px solid #000; }
    ::-webkit-scrollbar-thumb { background: #000; border: 2px solid #fffdf5; }
    
    @media print {
      body { background-color: white !important; }
      .no-print { display: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .print-border-none { border: none !important; box-shadow: none !important; padding: 0 !important; }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfkqKKgX5WqFMZ-wUI0RIjmZyahrD1uWg",
      authDomain: "sistem-presensi-96dae.firebaseapp.com",
      projectId: "sistem-presensi-96dae",
      storageBucket: "sistem-presensi-96dae.firebasestorage.app",
      messagingSenderId: "444659307342",
      appId: "1:444659307342:web:b1f8b7833f76a43ec8c41f",
      measurementId: "G-XDXXMENG8X"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.fs = { collection, getDocs };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
</head>
<body class="bg-brutal-neutral text-black font-inter antialiased selection:bg-brutal-secondary selection:text-black">
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let targetMonthParam = urlParams.get('month') || "";
    const vidParam = urlParams.get('vid');
    
    if (!targetMonthParam && vidParam && vidParam.length >= 6) {
       targetMonthParam = vidParam.substring(0, 4) + '-' + vidParam.substring(4, 6);
    }
    window.TARGET_MONTH = targetMonthParam;
    window.VID_PARAM = vidParam || "-";
  </script>

  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    function getLocalYYYYMMDD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function VerificationApp() {
      const [isLoading, setIsLoading] = useState(true);
      const [settingsDb, setSettingsDb] = useState({});
      const [usersDb, setUsersDb] = useState([]);
      const [attendanceDb, setAttendanceDb] = useState([]);
      const [holidaysDb, setHolidaysDb] = useState([]);
      
      const targetValid = window.TARGET_MONTH && window.TARGET_MONTH.length > 0 && window.TARGET_MONTH.includes('-');
      const [yearStr, monthStr] = targetValid 
        ? window.TARGET_MONTH.split('-') 
        : [new Date().getFullYear().toString(), String(new Date().getMonth() + 1).padStart(2, '0')];
        
      const year = parseInt(yearStr);
      const monthIndex = parseInt(monthStr) - 1; 
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

      useEffect(() => {
        const initData = async () => {
          try {
            const [usersSnap, attSnap, holSnap, setSnap] = await Promise.all([
              window.fs.getDocs(window.fs.collection(window.db, "users")),
              window.fs.getDocs(window.fs.collection(window.db, "attendance")),
              window.fs.getDocs(window.fs.collection(window.db, "holidays")),
              window.fs.getDocs(window.fs.collection(window.db, "settings"))
            ]);

            setUsersDb(usersSnap.docs.map(d => d.data()));
            setAttendanceDb(attSnap.docs.map(d => d.data()));
            setHolidaysDb(holSnap.docs.map(d => d.data()));
            
            let s = {};
            setSnap.forEach(d => { if(d.id === 'config') s = d.data(); });
            setSettingsDb(s);
            
            setIsLoading(false);
          } catch (error) {
            console.error("Gagal memuat dokumen resmi dari Firestore", error);
            setIsLoading(false);
          }
        };

        const checkFirebase = () => {
          if (window.db && window.fs) initData();
          else window.addEventListener('firebase-ready', initData, {once: true});
        };
        checkFirebase();
      }, []);

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center flex-col">
            <div className="w-16 h-16 border-4 border-black border-t-brutal-secondary rounded-none animate-spin mb-6"></div>
            <p className="font-space font-bold text-black uppercase tracking-widest text-lg bg-white border-2 border-black px-4 py-2 shadow-brutal-sm">Memuat Dokumen...</p>
          </div>
        );
      }

      const clients = usersDb.filter(u => u.role === 'client');
      const monthName = new Date(year, monthIndex).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
      
      let pjs = [];
      try { pjs = JSON.parse(settingsDb.penanggungJawab || "[]"); } catch(e) {}
      if (pjs.length === 0) pjs = [{jabatan: 'Penanggung Jawab', nama: 'Belum Diatur', nip: '-'}];

      const nPjs = pjs.length;
      let htmlRows = [];
      let pjsIndex = 0;
      
      if (nPjs % 2 !== 0) {
          htmlRows.push({ type: 'center', item: pjs[0] });
          pjsIndex = 1;
      } else {
          htmlRows.push({ type: 'pair', left: pjs[1], right: pjs[0] });
          pjsIndex = 2;
      }

      while (pjsIndex < nPjs) {
          htmlRows.push({ type: 'pair', left: pjs[pjsIndex + 1], right: pjs[pjsIndex] });
          pjsIndex += 2;
      }
      htmlRows.reverse();

      const SignatureBlock = ({ pj }) => (
          <div className="flex flex-col items-center text-center pt-4">
              <p className="text-xs font-space font-bold text-black uppercase tracking-widest mb-12 bg-brutal-secondary px-2 py-1 border-2 border-black">{pj.jabatan}</p>
              <div className="border-b-4 border-black pb-2 px-4 min-w-[220px]">
                  <p className="font-syne font-black text-black uppercase tracking-wide text-lg">{pj.nama}</p>
              </div>
              <p className="text-xs font-space font-bold text-black mt-2">{pj.nip && pj.nip !== '-' ? pj.nip : '\u00A0'}</p>
          </div>
      );

      const addressParts = [
        settingsDb.alamat,
        settingsDb.desaKecamatan,
        settingsDb.kotaKabupaten,
        settingsDb.negara,
        settingsDb.kodePos
      ].filter(Boolean).join(', ');

      const displayVid = window.VID_PARAM !== "-" ? window.VID_PARAM : `${year}${monthStr}-XXXXXXXX`;

      return (
        <div className="min-h-screen py-10 px-4 sm:px-6 lg:px-8 print:py-0 print:px-0">
          <div className="max-w-6xl mx-auto bg-white shadow-brutal-lg border-4 border-black p-8 sm:p-14 print-border-none relative">
            
            <div className="flex flex-col md:flex-row justify-between items-start gap-8 pb-8 border-b-8 border-black mb-10">
              <div className="flex items-start gap-6">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-brutal-secondary border-4 border-black rounded-none flex items-center justify-center text-black shrink-0 shadow-brutal">
                  <i className="fas fa-building text-3xl md:text-4xl"></i>
                </div>
                <div>
                  {settingsDb.namaKegiatan && settingsDb.namaKegiatan.trim() !== '' && (
                    <h2 className="text-lg md:text-xl font-space font-bold text-black tracking-widest uppercase leading-none mb-2 bg-brutal-tertiary inline-block px-2 py-1 border-2 border-black">
                      {settingsDb.namaKegiatan}
                    </h2>
                  )}
                  <h1 className="text-3xl md:text-5xl font-syne font-black text-black uppercase leading-none mb-3">
                    {settingsDb.namaInstansi || 'Instansi Sistem Presensi'}
                  </h1>
                  {addressParts && (
                    <p className="text-black font-bold font-inter text-sm md:text-base max-w-2xl leading-relaxed uppercase border-l-4 border-black pl-3 bg-brutal-neutral py-2 pr-2">
                      {addressParts}
                    </p>
                  )}
                </div>
              </div>

              <div className="flex flex-col md:items-end w-full md:w-auto bg-white md:bg-transparent p-5 md:p-0 rounded-none border-4 border-black shadow-[4px_4px_0_0_#000] md:shadow-none md:border-none">
                 <div className="inline-flex items-center space-x-4 bg-brutal-cyan text-black px-5 py-3 rounded-none border-4 border-black mb-5 shadow-brutal-sm">
                    <i className="fas fa-check-square text-3xl"></i>
                    <span className="text-lg font-syne font-black uppercase tracking-wider">Terverifikasi</span>
                 </div>
                 
                 <table className="text-xs text-black font-space font-bold uppercase text-left md:text-right border-collapse">
                   <tbody>
                     <tr className="border-b-2 border-black">
                       <td className="pr-4 py-2 text-black bg-brutal-neutral border-r-2 border-black px-2">ID Dokumen</td>
                       <td className="py-2 pl-2 text-black tabular-nums">{displayVid}</td>
                     </tr>
                     <tr>
                       <td className="pr-4 py-2 text-black bg-brutal-neutral border-r-2 border-black px-2">Tipe Data</td>
                       <td className="py-2 pl-2 text-black">Laporan Kehadiran</td>
                     </tr>
                   </tbody>
                 </table>
              </div>
            </div>

            <div className="mb-10 flex flex-col md:flex-row md:items-center justify-between bg-white border-4 border-black p-6 sm:p-8 rounded-none shadow-[8px_8px_0_0_#000]">
              <div>
                <h2 className="text-2xl md:text-3xl font-syne font-black text-black uppercase">Rekapitulasi Presensi</h2>
                <p className="text-sm text-black font-space font-bold mt-2 uppercase tracking-wider bg-brutal-neutral inline-block px-2 border-2 border-black">Data Sistem Langsung</p>
              </div>
              <div className="mt-6 md:mt-0 bg-brutal-secondary px-6 py-4 rounded-none border-4 border-black shadow-brutal-sm text-left md:text-center">
                <p className="text-[10px] font-space font-bold text-black uppercase tracking-widest border-b-2 border-black pb-1 mb-2">Periode Laporan</p>
                <p className="text-lg sm:text-2xl text-black font-syne font-black uppercase">{monthName}</p>
              </div>
            </div>

            <div className="overflow-x-auto pb-6">
              <table className="w-full text-left border-collapse min-w-[800px] border-4 border-black font-inter">
                <thead>
                  <tr className="bg-brutal-secondary text-xs font-space font-bold uppercase text-black border-b-4 border-black">
                    <th className="p-3 border-r-2 border-black text-center w-12">No</th>
                    <th className="p-3 border-r-4 border-black whitespace-nowrap">Nama Lengkap</th>
                    {Array.from({ length: daysInMonth }, (_, i) => (
                      <th key={i} className="p-3 border-r-2 border-black text-center w-8 bg-white">{i + 1}</th>
                    ))}
                    <th className="p-3 border-r-2 border-l-2 border-black text-center bg-brutal-cyan" title="Hadir">H</th>
                    <th className="p-3 border-r-2 border-black text-center bg-brutal-secondary" title="Izin">I</th>
                    <th className="p-3 border-r-2 border-black text-center bg-brutal-tertiary" title="Sakit">S</th>
                    <th className="p-3 text-center bg-brutal-error" title="Alpa">A</th>
                  </tr>
                </thead>
                <tbody className="text-[11px] sm:text-xs">
                  {clients.map((client, index) => {
                    let totalH = 0, totalI = 0, totalS = 0, totalA = 0;
                    const dailyData = Array.from({ length: daysInMonth }, (_, d) => {
                      const dayDate = new Date(year, monthIndex, d + 1);
                      const dateStr = getLocalYYYYMMDD(dayDate);
                      const dayOfWeek = dayDate.getDay();
                      const isRoutineHoliday = (dayOfWeek === 0 && String(settingsDb.liburMinggu).toLowerCase() === 'true') || (dayOfWeek === 6 && String(settingsDb.liburSabtu).toLowerCase() === 'true');
                      const isSpecialHoliday = holidaysDb.find(h => h.date === dateStr);
                      
                      const record = attendanceDb.find(a => a.userId === client.id && a.date === dateStr);
                      const hasActivityOnDate = attendanceDb.some(a => a.date === dateStr);

                      if (record) {
                        const s = record.status;
                        if (['Hadir', 'Terlambat'].includes(s)) { totalH++; return s === 'Hadir' ? {val: 'H', color: 'bg-[#7fdde0] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'} : {val: 'T', color: 'bg-[#ffd23f] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'}; }
                        if (s === 'Izin') { totalI++; return {val: 'I', color: 'bg-[#ffd23f] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'}; }
                        if (s === 'Sakit') { totalS++; return {val: 'S', color: 'bg-[#ff6b6b] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'}; }
                        if (s === 'Alpa') { totalA++; return {val: 'A', color: 'bg-[#ff4d4d] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'}; }
                        return {val: '', color: ''};
                      } else {
                        if (isRoutineHoliday || isSpecialHoliday) return {val: 'L', color: 'bg-black text-white font-bold'};
                        if (dayDate <= new Date() && hasActivityOnDate) { totalA++; return {val: 'A', color: 'bg-[#ff4d4d] font-bold text-black border-2 border-black shadow-[inset_2px_2px_0_0_#000]'}; }
                        return {val: '', color: ''};
                      }
                    });

                    return (
                      <tr key={client.id} className="border-b-2 border-black last:border-b-0 hover:bg-brutal-neutral">
                        <td className="p-3 border-r-2 border-black text-center font-bold text-black">{index + 1}</td>
                        <td className="p-3 border-r-4 border-black font-bold text-black whitespace-nowrap text-sm">{client.name}</td>
                        {dailyData.map((data, i) => (
                          <td key={i} className={`p-1 text-center border-r-2 border-black align-middle`}>
                             <div className={`w-full h-full min-h-[24px] flex items-center justify-center ${data.color}`}>{data.val}</div>
                          </td>
                        ))}
                        <td className="p-3 border-r-2 border-l-2 border-black text-center font-black text-black bg-white text-sm">{totalH}</td>
                        <td className="p-3 border-r-2 border-black text-center font-black text-black bg-white text-sm">{totalI}</td>
                        <td className="p-3 border-r-2 border-black text-center font-black text-black bg-white text-sm">{totalS}</td>
                        <td className="p-3 text-center font-black text-black bg-white text-sm">{totalA}</td>
                      </tr>
                    );
                  })}
                  {clients.length === 0 && <tr><td colSpan={daysInMonth + 6} className="p-14 text-center text-black font-space font-bold uppercase tracking-widest text-lg">Tidak ada data client.</td></tr>}
                </tbody>
              </table>
              <div className="mt-8 flex flex-wrap gap-4 text-xs text-black font-space font-bold uppercase tracking-wider bg-white p-4 border-4 border-black shadow-[4px_4px_0_0_#000]">
                <span className="flex items-center gap-2 mr-2 border-r-2 border-black pr-4">Keterangan :</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-[#7fdde0] border-2 border-black mr-2"></div>H = Hadir</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-[#ffd23f] border-2 border-black mr-2"></div>T = Terlambat</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-[#ffd23f] border-2 border-black mr-2"></div>I = Izin</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-[#ff6b6b] border-2 border-black mr-2"></div>S = Sakit</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-[#ff4d4d] border-2 border-black mr-2"></div>A = Alpa</span>
                <span className="flex items-center"><div className="w-4 h-4 bg-black border-2 border-black mr-2"></div>L = Libur</span>
              </div>
            </div>

            <div className="mt-16 pt-12 border-t-8 border-black">
              <div className="flex flex-col space-y-16">
                {htmlRows.map((row, rIdx) => {
                  if (row.type === 'center') {
                    return (
                      <div key={rIdx} className="flex justify-center w-full">
                        <SignatureBlock pj={row.item} />
                      </div>
                    );
                  } else {
                    return (
                      <div key={rIdx} className="flex flex-col sm:flex-row print:flex-row justify-between items-center w-full px-4 sm:px-12 gap-y-16 sm:gap-y-0 print:gap-y-0">
                        <div className="w-full sm:w-1/2 print:w-1/2 flex justify-center">
                          <SignatureBlock pj={row.left} />
                        </div>
                        <div className="w-full sm:w-1/2 print:w-1/2 flex justify-center">
                          <SignatureBlock pj={row.right} />
                        </div>
                      </div>
                    );
                  }
                })}
              </div>
            </div>

          </div>

          <div className="text-center mt-12 no-print pb-16">
             <button onClick={() => window.print()} className="bg-brutal-secondary text-black font-space font-bold py-5 px-14 border-4 border-black rounded-none shadow-[8px_8px_0_0_#000] hover:shadow-[12px_12px_0_0_#000] hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest text-lg">
               <i className="fas fa-print mr-3 text-xl align-middle"></i> Cetak Laporan Ini
             </button>
             <p className="mt-6 text-xs text-black font-bold uppercase tracking-widest bg-white border-2 border-black inline-block px-4 py-2 shadow-[2px_2px_0_0_#000]">Gunakan orientasi Lanskap (Landscape) saat print tabel</p>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VerificationApp />);
  </script>
</body>
</html>
